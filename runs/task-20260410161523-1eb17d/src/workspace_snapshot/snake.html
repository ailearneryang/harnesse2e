<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;color:#e0e0e0;overflow:hidden;touch-action:none}
#header{display:flex;gap:30px;margin-bottom:10px;font-size:18px;min-height:28px}
#header span{font-weight:bold}
.score-val{color:#00d2ff}
canvas{border:2px solid #00d2ff;border-radius:4px;display:block;max-width:95vw;max-height:70vh}
#info{margin-top:10px;font-size:13px;color:#888;text-align:center;line-height:1.6}
#overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#overlay.active{pointer-events:auto}
#overlay h2{font-size:28px;margin-bottom:10px;color:#00d2ff}
#overlay p{font-size:16px;margin-bottom:16px}
#overlay button{padding:10px 28px;font-size:18px;border:2px solid #00d2ff;background:transparent;color:#00d2ff;border-radius:6px;cursor:pointer;transition:all .2s}
#overlay button:hover{background:#00d2ff;color:#1a1a2e}
</style>
</head>
<body>
<div id="header">
  <span>分数: <span id="score" class="score-val">0</span></span>
  <span>最高分: <span id="highScore" class="score-val">0</span></span>
</div>
<canvas id="gameCanvas"></canvas>
<div id="overlay" class="active">
  <h2 id="overlayTitle">贪吃蛇</h2>
  <p id="overlayMsg">按 空格键 或点击按钮开始</p>
  <button id="actionBtn">开始游戏</button>
</div>
<div id="info">方向键 / WASD 控制方向 · 空格键 暂停/恢复 · 移动端滑动控制</div>
<script>
/* ================================================================
 * 贪吃蛇 (Snake Game) — 单文件 HTML5 Canvas 实现
 * Task ID: task-20260408222240-8c9a8c
 * 满足需求: F001-F014, NFR001-NFR005
 * ================================================================ */
'use strict';

// ─── 常量配置 (RenderConfig / SpeedConfig 来自 data_model) ───
const GRID     = 20;          // F001: 20×20 网格
const INIT_LEN = 3;           // F002: 初始蛇长度 3
const BASE_INTERVAL = 150;    // F003/F013: 初始帧间隔 150ms
const MIN_INTERVAL  = 50;     // F013: 最小帧间隔 50ms
const SPEED_STEP    = 10;     // F013: 每级减少 10ms
const FOOD_PER_LEVEL = 5;     // F013: 每 5 个食物加速一次
const SCORE_PER_FOOD = 10;    // F010: 每个食物 10 分
const SWIPE_THRESHOLD = 30;   // F005: 触屏滑动最小阈值 30px
const LS_KEY = 'snakeHighScore'; // F011/NFR005: localStorage 键

// ─── 方向枚举 (Direction 实体) ───
const DIR = { UP:{x:0,y:-1}, DOWN:{x:0,y:1}, LEFT:{x:-1,y:0}, RIGHT:{x:1,y:0} };

// ─── 颜色配置 (WCAG AA ≥4.5:1 对比度 — NFR003) ───
const COLOR = {
  bg:       '#0f3460',   // 画布背景
  grid:     '#16213e',   // 网格线
  head:     '#00d2ff',   // 蛇头 — F002
  body:     '#0a8f6a',   // 蛇身 — F002
  food:     '#e94560',   // 食物红色 — F006
  overlay:  'rgba(0,0,0,0.7)'
};

// ─── 游戏状态机 (StateManager — F012) ───
// IDLE → PLAYING → PAUSED → GAME_OVER
const STATE = { IDLE:'IDLE', PLAYING:'PLAYING', PAUSED:'PAUSED', GAME_OVER:'GAME_OVER' };

// ─── DOM 引用 ───
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const scoreEl    = document.getElementById('score');
const highScoreEl= document.getElementById('highScore');
const overlay    = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const actionBtn  = document.getElementById('actionBtn');

// ─── 游戏运行时状态 (GameState 实体) ───
let state, snake, food, direction, nextDirection, score, highScore;
let foodEaten, interval, lastTime, accumulator, animId;
let directionChanged; // F004: 每帧只响应第一次有效方向变更
let audioCtx;         // F014: Web Audio API 上下文 (懒初始化)

// ─── Canvas 尺寸自适应 (F001/NFR002) ───
let cellSize;
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth * 0.95, 600);
  const maxH = Math.min(window.innerHeight * 0.7, 600);
  const size = Math.floor(Math.min(maxW, maxH) / GRID) * GRID;
  canvas.width  = size;
  canvas.height = size;
  cellSize = size / GRID;
  // 定位 overlay
  const rect = canvas.getBoundingClientRect();
  overlay.style.width  = rect.width + 'px';
  overlay.style.height = rect.height + 'px';
  overlay.style.left   = rect.left + 'px';
  overlay.style.top    = rect.top + 'px';
  if (state) render(); // 重绘当前帧
}
window.addEventListener('resize', resizeCanvas);

// ─── 高分读写 (F011/NFR005) ───
function loadHighScore() {
  try { return parseInt(localStorage.getItem(LS_KEY), 10) || 0; } catch { return 0; }
}
function saveHighScore(val) {
  try { localStorage.setItem(LS_KEY, String(val)); } catch { /* 静默 */ }
}

// ─── 初始化游戏 (F002/F006/F010/F012) ───
function initGame() {
  state     = STATE.IDLE;
  score     = 0;
  foodEaten = 0;
  interval  = BASE_INTERVAL;
  direction = DIR.RIGHT;          // F002: 默认朝右
  nextDirection = DIR.RIGHT;
  directionChanged = false;
  accumulator = 0;
  lastTime = 0;
  // F002: 蛇在画布中央, 长度 3
  const startX = Math.floor(GRID / 2);
  const startY = Math.floor(GRID / 2);
  snake = [];
  for (let i = 0; i < INIT_LEN; i++) snake.push({ x: startX - i, y: startY });
  spawnFood();                    // F006: 初始食物
  highScore = loadHighScore();
  scoreEl.textContent    = '0';
  highScoreEl.textContent = String(highScore);
  showOverlay('贪吃蛇', '按 空格键 或点击按钮开始', '开始游戏');
}

// ─── 食物生成 (F006) — 随机空闲格子 ───
function spawnFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!occupied.has(x + ',' + y)) free.push({ x, y });
  if (free.length === 0) return; // 网格占满 — 极端情况
  food = free[Math.floor(Math.random() * free.length)];
}

// ─── 蛇移动 + 碰撞检测 (F003/F007/F008/F009) ───
function update() {
  direction = nextDirection;
  directionChanged = false;
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // F008: 撞墙检测
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    gameOver(); return;
  }
  // F009: 撞自身检测
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) { gameOver(); return; }
  }
  snake.unshift(head);

  // F007: 吃食物判定
  if (head.x === food.x && head.y === food.y) {
    score += SCORE_PER_FOOD;          // F010
    foodEaten++;
    scoreEl.textContent = String(score);
    playSound('eat');                  // F014
    spawnFood();                       // F006
    // F013: 速度递增 — 每 5 个食物减 10ms, 下限 50ms
    if (foodEaten % FOOD_PER_LEVEL === 0 && interval > MIN_INTERVAL) {
      interval = Math.max(MIN_INTERVAL, interval - SPEED_STEP);
    }
  } else {
    snake.pop(); // 未吃到食物, 移除尾部
  }
}

// ─── 游戏结束 (F008/F009/F011/F012) ───
function gameOver() {
  state = STATE.GAME_OVER;
  playSound('die');                    // F014
  if (score > highScore) {             // F011
    highScore = score;
    saveHighScore(highScore);
    highScoreEl.textContent = String(highScore);
  }
  cancelAnimationFrame(animId);
  showOverlay('游戏结束', '得分: ' + score, '重新开始');
}

// ─── 渲染 (Renderer — F001/F002/F006) ───
function render() {
  const cs = cellSize;
  // 清除画布 + 绘制背景
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // 网格线
  ctx.strokeStyle = COLOR.grid;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(canvas.width, i * cs); ctx.stroke();
  }
  // 食物 — 红色圆形 (F006)
  ctx.fillStyle = COLOR.food;
  ctx.beginPath();
  ctx.arc(food.x * cs + cs / 2, food.y * cs + cs / 2, cs * 0.4, 0, Math.PI * 2);
  ctx.fill();
  // 蛇身 (F002)
  for (let i = snake.length - 1; i >= 0; i--) {
    ctx.fillStyle = i === 0 ? COLOR.head : COLOR.body;
    ctx.fillRect(snake[i].x * cs + 1, snake[i].y * cs + 1, cs - 2, cs - 2);
    if (i === 0) { // 蛇头眼睛装饰
      ctx.fillStyle = '#fff';
      const ex = snake[0].x * cs + cs * 0.3;
      const ey = snake[0].y * cs + cs * 0.3;
      ctx.fillRect(ex, ey, cs * 0.15, cs * 0.15);
      ctx.fillRect(ex + cs * 0.3, ey, cs * 0.15, cs * 0.15);
    }
  }
}

// ─── 主循环 (GameLoop — requestAnimationFrame + 累加器) ───
function gameLoop(timestamp) {
  if (state !== STATE.PLAYING) return;
  if (!lastTime) lastTime = timestamp;
  accumulator += timestamp - lastTime;
  lastTime = timestamp;
  // 以固定间隔步进游戏逻辑 (NFR001: 逻辑 ≤1ms)
  while (accumulator >= interval) {
    update();
    accumulator -= interval;
    if (state !== STATE.PLAYING) return; // update 可能触发 gameOver
  }
  render();
  animId = requestAnimationFrame(gameLoop);
}

// ─── 开始/重启游戏 ───
function startGame() {
  initGame();
  state = STATE.PLAYING;
  hideOverlay();
  lastTime = 0;
  accumulator = 0;
  render();
  animId = requestAnimationFrame(gameLoop);
}

// ─── Overlay 管理 (F012) ───
function showOverlay(title, msg, btnText) {
  overlayTitle.textContent = title;
  overlayMsg.textContent   = msg;
  actionBtn.textContent    = btnText;
  overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ─── 输入处理 (InputHandler — F004/F005/F012) ───

/** F004: 键盘控制 — 方向键 & WASD; 禁止180°反向; 每帧仅首次有效 */
const KEY_MAP = {
  ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
  w:'UP', W:'UP', s:'DOWN', S:'DOWN', a:'LEFT', A:'LEFT', d:'RIGHT', D:'RIGHT'
};
const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
const DIR_NAME = { UP:DIR.UP, DOWN:DIR.DOWN, LEFT:DIR.LEFT, RIGHT:DIR.RIGHT };

// 获取当前方向名称辅助函数
function getDirName(d) {
  if (d === DIR.UP) return 'UP';
  if (d === DIR.DOWN) return 'DOWN';
  if (d === DIR.LEFT) return 'LEFT';
  return 'RIGHT';
}

document.addEventListener('keydown', function(e) {
  // F012: 空格键 — 开始/暂停/恢复
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    handleAction();
    return;
  }
  if (state !== STATE.PLAYING) return;
  const dirKey = KEY_MAP[e.key];
  if (!dirKey) return;
  e.preventDefault();
  // F004: 禁止 180° 反向
  const curName = getDirName(direction);
  if (dirKey === OPPOSITE[curName]) return;
  // F004: 每帧只响应首次方向变更
  if (directionChanged) return;
  nextDirection = DIR_NAME[dirKey];
  directionChanged = true;
});

/** F012: 统一动作处理 (按钮点击 / 空格键) */
function handleAction() {
  if (state === STATE.IDLE || state === STATE.GAME_OVER) {
    startGame();
  } else if (state === STATE.PLAYING) {
    state = STATE.PAUSED;
    cancelAnimationFrame(animId);
    showOverlay('已暂停', '按 空格键 或点击按钮恢复', '继续游戏');
  } else if (state === STATE.PAUSED) {
    state = STATE.PLAYING;
    hideOverlay();
    lastTime = 0;
    accumulator = 0;
    animId = requestAnimationFrame(gameLoop);
  }
}
actionBtn.addEventListener('click', handleAction);

/** F005: 触屏滑动控制 */
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', function(e) {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });

canvas.addEventListener('touchend', function(e) {
  if (state !== STATE.PLAYING) {
    handleAction(); return;
  }
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  // F005: 滑动距离 < 30px 不触发
  if (Math.max(absDx, absDy) < SWIPE_THRESHOLD) return;
  let dirKey;
  if (absDx > absDy) dirKey = dx > 0 ? 'RIGHT' : 'LEFT';
  else dirKey = dy > 0 ? 'DOWN' : 'UP';
  const curName = getDirName(direction);
  if (dirKey === OPPOSITE[curName]) return;
  if (directionChanged) return;
  nextDirection = DIR_NAME[dirKey];
  directionChanged = true;
}, { passive: true });

// ─── 音效 (AudioManager — F014) — Web Audio API, 懒初始化 ───
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch { audioCtx = null; }
}

/**
 * F014: 播放简短音效 — 吃食物(eat)≤200ms, 游戏结束(die)≤500ms
 * 使用 OscillatorNode 合成, 无需外部音频文件
 */
function playSound(type) {
  if (!audioCtx) initAudio();
  if (!audioCtx) return; // 不支持则静默跳过 (F014 AC)
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'eat') {
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(900, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.15);
      osc.start(now); osc.stop(now + 0.2);
    } else {
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.linearRampToValueAtTime(100, now + 0.4);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.45);
      osc.start(now); osc.stop(now + 0.5);
    }
  } catch { /* 静默跳过 */ }
}

// ─── 启动 ───
resizeCanvas();
initGame();
render();
</script>
</body>
</html>
