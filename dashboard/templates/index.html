    return `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}m`;
}

function renderPipelineVisual(task) {
    const stages = task?.stages || {};
    const currentStage = task?.current_stage || '';
    const taskStatus = task?.status || '';
    
    // Use task's pipeline_snapshot if available, otherwise fall back to global STAGES
    const stageList = task?.pipeline_snapshot || STAGES;
    
    // If no task or empty pipeline, show empty state
    if (!task || stageList.length === 0) {
        return `<div class="pipeline-visual pipeline-empty">
            <div class="pipeline-empty-icon">📋</div>
            <div class="pipeline-empty-text">暂无活动任务</div>
            <div class="pipeline-empty-hint">提交新请求开始任务流程</div>
        </div>`;
    }
    
    // Determine display mode based on task status
    const isCompleted = ['completed', 'done'].includes(taskStatus);
    const isFailed = ['failed', 'error'].includes(taskStatus);
    const isRunning = ['running', 'in_progress'].includes(taskStatus);
    
    let html = '<div class="pipeline-visual">';
    
    // Status header for completed/failed tasks
    if (isCompleted || isFailed) {
        const statusIcon = isCompleted ? '✓' : '✗';
        const statusText = isCompleted ? '任务已完成' : '任务失败';
        const statusClass = isCompleted ? 'completed' : 'failed';
        const retryBtn = isFailed ? `<button class="psh-retry-btn" onclick="retryTask('${task.id}')" title="重试任务">🔄 重试</button>` : '';
        html += `<div class="pipeline-status-header ${statusClass}">
            <span class="psh-icon">${statusIcon}</span>
            <span class="psh-text">${statusText}</span>
            <span class="psh-time">${taskDuration(task)}</span>
            ${retryBtn}
        </div>`;
    }
    
    // Check for active fallback (a stage that was passed but now we're at an earlier stage)
    let fallbackInfo = null;
    const currentIdx = stageList.indexOf(currentStage);
    for (let i = currentIdx + 1; i < stageList.length; i++) {
        const stageData = stages[stageList[i]] || {};
        const retries = stageData.retry_count || stageData.attempts || 0;
        if (retries > 1 || ['failed','error'].includes(stageData.status)) {
            fallbackInfo = { from: stageList[i], fromIdx: i, to: currentStage, toIdx: currentIdx };
            break;
        }
    }
    
    // Fallback indicator banner (only for running tasks)
    if (fallbackInfo && isRunning) {
        html += `<div class="pipeline-fallback-banner">
            <span class="pfb-icon">↩</span>
            <span class="pfb-text">回退执行: <strong>${esc(humanStage(fallbackInfo.from))}</strong> → <strong>${esc(humanStage(fallbackInfo.to))}</strong></span>
        </div>`;
    }
    
    html += '<div class="pipeline-stages">';
    
    stageList.forEach((stage, idx) => {
        const stageData = stages[stage] || {};
        const status = stageData.status || 'pending';
        const isCurrent = stage === currentStage;
        const isLast = idx === stageList.length - 1;
        const duration = stageDuration(stageData);
        // Support both retry_count (state_machine) and attempts (pipeline_runner)
        const retryCount = Math.max((stageData.retry_count || 0), (stageData.attempts || 0) - 1, 0);
        
        // Check if this stage is the source of a fallback
        const isFallbackSource = fallbackInfo?.from === stage;
        
        // Determine node status class
        let nodeStatus = 'pending';
        if (['completed','done','passed'].includes(status)) nodeStatus = 'passed';
        else if (['failed','error'].includes(status)) nodeStatus = 'failed';
        else if (['running','in_progress'].includes(status) || isCurrent) nodeStatus = 'running';
        else if (['waiting','waiting_human'].includes(status)) nodeStatus = 'waiting_human';
        
        // Show retry button for failed stages when task is also failed
        const showRetry = nodeStatus === 'failed' && isFailed;
        
        html += `
            <div class="pipeline-stage ${nodeStatus} ${isCurrent ? 'current' : ''} ${isFallbackSource ? 'fallback-source' : ''}">
                <div class="pipeline-stage-node">
                    ${getStageIcon(stage)}
                    ${retryCount > 0 ? `<span class="retry-badge" title="已重试 ${retryCount} 次">${retryCount}</span>` : ''}
                    ${showRetry ? `<button class="stage-retry-btn" onclick="event.stopPropagation();retryTask('${task.id}')" title="从此阶段重试">↻</button>` : ''}
                </div>
                <div class="pipeline-stage-info">
                    <div class="psi-name">${esc(humanStage(stage))}</div>
                    <div class="psi-status ${nodeStatus}">${getStatusText(status)}${retryCount > 0 ? ` · 重试${retryCount}` : ''}</div>
                    ${duration ? `<div class="psi-time">${duration}</div>` : ''}
                </div>
            </div>
            ${!isLast ? '<div class="pipeline-stage-connector"><div class="connector-line"></div></div>' : ''}
        `;
    });
    
    html += '</div></div>';
    return html;
}

/* ── API ── */
async function fetchRuntime() {
    const r = await fetch('/api/runtime');
    runtime = await r.json();
    if (!latestEvents.length) latestEvents = runtime.events || [];
    // Fetch pipeline config only once
    if (!pipelineFetched) {
        try {
            const pr = await fetch('/api/pipeline');
            const pd = await pr.json();
            pipelineIsCustom = pd.is_custom ?? false;
            pipelineFetched = true;
        } catch(e) {}
    }
    render();
}
async function submitRequest() {
    const title = document.getElementById('req-title').value.trim();
    const text = document.getElementById('req-text').value.trim();
    const source = document.getElementById('req-source').value.trim() || 'web';
    if (!text) { alert('请输入需求内容'); return; }
    await fetch('/api/requests', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,text,source}) });
    document.getElementById('req-title').value = '';
    document.getElementById('req-text').value = '';
    await fetchRuntime();
}
async function controlRunner(action) { await fetch(`/api/control/${action}`,{method:'POST'}); await fetchRuntime(); }
async function resolveApproval(taskId, approvalId, resolution) {
    await fetch(`/api/approvals/${taskId}/${approvalId}/resolve`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({resolution}) });
    await fetchRuntime();
}
async function retryTask(taskId) {
    try {
        const r = await fetch(`/api/tasks/${taskId}/retry`, { method:'POST' });
        if (r.ok) {
            showToast('任务已重新加入队列');
        } else {
            const data = await r.json().catch(() => ({}));
            showToast(data.error || '重试失败', true);
        }
    } catch (e) {
        showToast('重试请求失败', true);
    }
    await fetchRuntime();
}
async function deleteTask(taskId) {
    if (!confirm('确定删除这个任务？')) return;
    await fetch(`/api/tasks/${taskId}`, { method:'DELETE' });
    await fetchRuntime();
}

/* ── Navigation ── */
function setNav(id) {
    activeNav = id;
    render();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

/* ── Render ── */

    const textFocused = document.activeElement?.id === 'req-text';
    const sourceFocused = document.activeElement?.id === 'req-source';

    app.innerHTML = `
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">H</div>

                    <div class="logo-text">HARNESS</div>

        <nav class="nav-section">

    <!-- Main -->
    <main class="main">

        <div class="metrics">

            <div class="metric-card token-card"><div class="metric-label">Token 用量</div><div class="metric-value ${tokenStatusCls(budget.status)}">${fmtTokens(budget.used)}</div><div class="metric-hint">${budget.percent}% · ${fmtTokens(budget.limit)} 限额</div></div>

                            </div>

                        ${['all','info','success','warning','error'].map(f => `<button class="btn sm ${feedFilter===f?'active':''}" onclick="feedFilter='${f}';render()">${f}</button>`).join('')}
                    </div>
                </div>
                <div class="section-body">${renderFeed(latestEvents)}</div>
            </section>
        </div>
    </main>`;

    /* Restore input values */
    const ti = document.getElementById('req-title');
    const tx = document.getElementById('req-text');
    const sr = document.getElementById('req-source');
    if (ti) ti.value = savedTitle;
    if (tx) tx.value = savedText;
    if (sr) sr.value = savedSource;
    if (titleFocused && ti) ti.focus();
    if (textFocused && tx) tx.focus();
    if (sourceFocused && sr) sr.focus();

    /* Render artifact body only if it's empty (first load) or no task selected yet */
    const ab = document.getElementById('artifact-body');
    if (ab && !ab.hasChildNodes()) {
        ab.innerHTML = artifactCache[artifactTaskId]

    }

    /* Init pipeline editor (only writes DOM on first load) */
    initPipelineEditor();
}

/* ── Sub-renderers ── */
function fmtDuration(startStr, endStr) {
    if (!startStr) return '';
    const start = new Date(startStr);
    const end = endStr ? new Date(endStr) : new Date();
    const sec = Math.round((end - start) / 1000);
    if (sec < 60) return `${sec}s`;
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    if (min < 60) return `${min}m${s}s`;
    return `${Math.floor(min/60)}h${min%60}m`;
}
function taskDuration(task) {
    if (!task) return '-';
    const stages = task.stages || {};
    let earliest = null, latest = null;
    for (const s of Object.values(stages)) {
        if (s.started_at) { const d = new Date(s.started_at); if (!earliest || d < earliest) earliest = d; }
        if (s.ended_at) { const d = new Date(s.ended_at); if (!latest || d > latest) latest = d; }
    }
    if (!earliest) return '-';
    if (!latest && task.status === 'running') latest = new Date();
    if (!latest) return '-';
    return fmtDuration(earliest.toISOString(), latest.toISOString());
}

function renderPipeline(task) {
    if (!task) return '<div class="empty">暂无活动任务</div>';
    const stageMap = task.stages || {};
    return `<div class="pipeline">${STAGES.map((s,i) => {
        const item = stageMap[s] || {status:'pending'};
        const dur = (item.started_at && item.status !== 'pending') ? fmtDuration(item.started_at, item.ended_at) : '';
        return `<div class="stage-step ${statusCls(item.status)} ${item.status==='running'?'pulse':''}">
            <div class="stage-num">${i+1}</div>
            <div class="stage-name">${esc(humanStage(s))}</div>
            <div class="stage-status-tag">${esc(item.status||'pending')}${dur ? ' · '+dur : ''}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderKanban(tasks) {
    if (!tasks.length) return '<div class="empty">还没有任务。先提交一个请求。</div>';
    const cols = [
        {key:'progress',title:'In Progress',cls:'progress'},
        {key:'review',title:'In Review',cls:'review'},
        {key:'done',title:'Done',cls:'done'},
        {key:'attention',title:'Needs Attention',cls:'attention'}
    ];
    const grouped = {}; cols.forEach(c=>grouped[c.key]=[]);
    tasks.forEach(t=>grouped[classifyTask(t)].push(t));
    return `<div class="kanban">${cols.map(col => {
        const items = grouped[col.key];
        return `<div class="kanban-col ${col.cls}">
            <div class="kanban-col-head"><span class="kanban-col-title">${col.title}</span><span class="kanban-col-count">${items.length}</span></div>
            <div class="kanban-cards">${items.length ? items.map(t => {
                const p = taskPct(t);
                const badges = Object.entries(t.stages||{}).filter(([,v])=>v.status&&v.status!=='pending').slice(-3).map(([s,v])=>`<span class="badge ${statusCls(v.status)}">${esc(humanStage(s))}</span>`).join('');
                return `<div class="task-card ${statusCls(t.status)}">
                    <div class="task-card-head"><div><div class="task-card-title">${esc(t.title||'Untitled')}</div><div class="task-card-sub">${esc(t.source||'unknown')} · ${esc(humanStage(t.current_stage||'queued'))}</div></div><span class="badge ${statusCls(t.status)}">${esc(t.status||'queued')}</span></div>
                    <div class="task-card-body">${esc(t.request_text||'')}</div>
                    <div class="task-card-progress"><div class="task-card-progress-top"><span>${esc(t.id||'-')}</span><span>${p}%</span></div><div class="task-microbar"><span style="width:${p}%"></span></div></div>
                    <div class="task-card-badges">${badges||'<span class="badge queued">queued</span>'}${t.status==='failed'?`<button class="btn danger sm" style="margin-left:auto" onclick="retryTask('${esc(t.id)}')">从失败处继续</button><button class="btn ghost sm" onclick="deleteTask('${esc(t.id)}')">删除</button>`:(t.status==='completed'?`<button class="btn ghost sm" style="margin-left:auto" onclick="deleteTask('${esc(t.id)}')">删除</button>`:'')}</div>
                </div>`;
            }).join('') : '<div class="empty">无</div>'}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderApprovals(approvals) {
    if (!approvals.length) return '<div class="empty">当前没有待处理审批</div>';

function renderAgents(agents) {

async function loadArtifacts(taskId) {
    artifactTaskId = taskId;
    openArtifacts.clear();
    const ab = document.getElementById('artifact-body');
    if (!taskId) {
        if (ab) ab.innerHTML = '<div class="empty">选择一个任务查看产物</div>';
        return;
    }
    if (ab) ab.innerHTML = '<div class="empty">加载中...</div>';
    if (!artifactCache[taskId]) {
        const r = await fetch(`/api/tasks/${taskId}/artifacts`);
        artifactCache[taskId] = await r.json();
    }
    if (ab) ab.innerHTML = renderArtifacts(artifactCache[taskId]);
}

function toggleArtifact(id) {
    if (openArtifacts.has(id)) openArtifacts.delete(id);
    else openArtifacts.add(id);
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}

function downloadArtifact(name, content) {
    const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

function renderArtifacts(data) {
    if (!data || !Object.keys(data).length) return '<div class="empty">该任务暂无产物</div>';
    let counter = 0;
    return `<div class="artifact-stages">${STAGES.map(stage => {
        const files = data[stage];
        if (!files || !files.length) return '';
        return `<div>
            <div class="artifact-stage-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'grid':'none'">
                <span class="artifact-stage-name">${esc(humanStage(stage))}</span>
                <span class="artifact-stage-count">${files.length} file${files.length>1?'s':''}</span>
            </div>
            <div class="artifact-files" style="display:none">${files.map(f => {
                const id = 'af-' + (counter++);
                const isJson = f.name.endsWith('.json');
                const display = isJson ? (()=>{ try { return JSON.stringify(JSON.parse(f.content),null,2); } catch(e) { return f.content; } })() : f.content;
                const isOpen = openArtifacts.has(id);
                return `<div class="artifact-file">
                    <div class="artifact-file-header" onclick="toggleArtifact('${id}')">
                        <div>
                            <div class="artifact-file-name">${esc(f.name)}</div>
                            <div class="artifact-file-path">${esc(f.path)}</div>
                        </div>
                        <div style="display:flex;gap:8px;align-items:center">
                            <button class="btn ghost sm" onclick="event.stopPropagation();downloadArtifact('${esc(f.name)}',artifactCache['${esc(artifactTaskId)}']['${esc(stage)}'][${files.indexOf(f)}].content)">下载</button>
                            <span class="artifact-file-toggle">${isOpen?'▲':'▼'}</span>
                        </div>
                    </div>
                    <div class="artifact-content ${isOpen?'open':''}" id="${id}"><pre>${esc(display)}</pre></div>
                </div>`;
            }).join('')}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderFeed(events) {
    let filtered = [...events].reverse().slice(0,150);
    if (feedFilter !== 'all') filtered = filtered.filter(e => e.level === feedFilter);
    if (!filtered.length) return '<div class="empty">暂无事件</div>';
    return `<div class="feed">${filtered.map(e => `
        <div class="feed-item">
            <div class="feed-top">
                <span class="feed-dot ${esc(e.level||'info')}"></span>
                <span class="feed-time">${fmtTime(e.timestamp)}</span>
                <span class="feed-source">${esc(e.source||'system')}</span>
                ${e.stage?`<span class="feed-stage-tag">${esc(humanStage(e.stage))}</span>`:''}
            </div>
            <div class="feed-msg">${esc(e.message||'')}</div>
        </div>
    `).join('')}</div>`;
}

const ALL_STAGES = [
    {id:'intake', name:'Request Intake', agent:'planner', icon:'📥'},
    {id:'planning', name:'Sprint Planning', agent:'planner', icon:'📋'},
    {id:'requirements', name:'Requirements', agent:'requirements-analyst', icon:'📝'},
    {id:'design', name:'System Design', agent:'system-architect', icon:'🏗️'},
    {id:'development', name:'Implementation', agent:'developer', icon:'💻'},
    {id:'code_review', name:'Code Review', agent:'code-reviewer', icon:'👁️'},
    {id:'security_review', name:'Security Review', agent:'security-reviewer', icon:'🔒'},
    {id:'safety_review', name:'Safety Review', agent:'safety-reviewer', icon:'🛡️'},
    {id:'testing', name:'QA Testing', agent:'qa-engineer', icon:'🧪'},
    {id:'build_verification', name:'Build Verify', agent:'build-verifier', icon:'🔧'},
    {id:'delivery', name:'Gerrit Delivery', agent:'delivery-manager', icon:'🚀'},
];

// Stage data with fallback rules
let editorStages = [];
let fallbackRules = {}; // { stageId: { enabled: boolean, targetStageId: string, maxRetries: number } }
let selectedStageId = null;
let editorLoaded = false;
let pipelineIsCustom = false;
let pipelineFetched = false;
let renderThrottleTimer = null;
let pendingAddStage = null;

function initPipelineEditor() {
    if (!editorLoaded) {
        editorStages = STAGES.map(id => {
            const stage = ALL_STAGES.find(s => s.id === id);
            return stage ? {...stage} : {id, name: id, agent: '-', icon: '⚙️'};
        });
        // Initialize default fallback rules
        fallbackRules = {};
        editorStages.forEach(s => {
            fallbackRules[s.id] = { enabled: false, targetStageId: '', maxRetries: 3 };
        });
        // Default: testing fails -> development
        if (fallbackRules.testing) {
            fallbackRules.testing = { enabled: true, targetStageId: 'development', maxRetries: 3 };
        }
        // Default: code_review fails -> development
        if (fallbackRules.code_review) {
            fallbackRules.code_review = { enabled: true, targetStageId: 'development', maxRetries: 2 };
        }
        editorLoaded = true;
    }
    const tag = document.getElementById('pipe-mode-tag');
    const btn = document.getElementById('pipe-restore-btn');
    if (tag) tag.textContent = pipelineIsCustom ? '自定义配置' : '系统默认';
    if (btn) btn.style.display = pipelineIsCustom ? '' : 'none';
    renderPipelineEditor();
}

function renderPipelineEditor() {
    const body = document.getElementById('pipe-editor-body');
    if (!body) return;

    const flowHtml = editorStages.map((s, i) => {
        const hasFallback = fallbackRules[s.id]?.enabled;
        const isSelected = selectedStageId === s.id;
        const rule = fallbackRules[s.id];
        const targetStage = rule?.enabled ? editorStages.find(t => t.id === rule.targetStageId) : null;
        return `
            ${i > 0 ? `<div class="pipe-connector"><svg viewBox="0 0 32 12"><path d="M0 6 L24 6 M20 2 L26 6 L20 10"/></svg></div>` : ''}
            <div class="pipe-node ${isSelected ? 'selected' : ''} ${hasFallback ? 'has-fallback' : ''}" 
                 onclick="selectPipeStage('${s.id}')" data-stage="${s.id}" data-index="${i}">
                <div class="pipe-node-card">
                    <div class="pipe-node-num">${i + 1}</div>
                    <div class="pipe-node-name">${esc(s.name)}</div>
                    <div class="pipe-node-agent">${esc(s.agent)}</div>
                    <div class="pipe-node-actions">
                        <button class="pipe-node-btn settings" onclick="event.stopPropagation();selectPipeStage('${s.id}')" title="配置">⚙</button>
                        <button class="pipe-node-btn delete" onclick="event.stopPropagation();pipeRemove(${i})" title="删除">×</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // Build fallback arrows data
    const fallbackArrows = [];
    editorStages.forEach((s, i) => {
        const rule = fallbackRules[s.id];
        if (rule?.enabled && rule.targetStageId) {
            const targetIdx = editorStages.findIndex(t => t.id === rule.targetStageId);
            if (targetIdx >= 0 && targetIdx < i) {
                fallbackArrows.push({
                    fromIdx: i,
                    toIdx: targetIdx,
                    fromId: s.id,
                    toId: rule.targetStageId,
                    fromName: s.name,
                    toName: editorStages[targetIdx].name,
                    retries: rule.maxRetries
                });
            }
        }
    });

    // Build legend if there are fallback rules
    const hasAnyFallback = fallbackArrows.length > 0;
    const legendHtml = hasAnyFallback ? `
        <div class="pipe-legend">
            <div class="pipe-legend-item">
                <div class="pipe-legend-line"></div>
                <span>正常流程</span>
            </div>
            <div class="pipe-legend-item">
                <div class="pipe-legend-line fallback"></div>
                <span>失败回退 (点击查看详情)</span>
            </div>
        </div>
    ` : '';

    const configPanelHtml = selectedStageId ? renderStageConfig(selectedStageId) : '';

    body.innerHTML = `
        <div class="pipe-editor-v2">
            <div class="pipe-canvas" id="pipe-canvas">
                <div class="pipe-flow" id="pipe-flow">
                    ${flowHtml}
                    <div class="pipe-connector"><svg viewBox="0 0 32 12"><path d="M0 6 L24 6 M20 2 L26 6 L20 10"/></svg></div>
                    <div class="pipe-add-node" onclick="openAddStageModal()">
                        <div class="pipe-add-btn">+</div>
                        <div class="pipe-add-label">添加</div>
                    </div>
                </div>
                <svg class="pipe-fallback-layer" id="pipe-fallback-svg"></svg>
            </div>
            ${legendHtml}
            ${configPanelHtml}
        </div>
    `;

    // Draw fallback arrows after DOM is ready
    if (fallbackArrows.length > 0) {
        requestAnimationFrame(() => drawFallbackArrows(fallbackArrows));
    }
    
    // Render preview
    renderEditorPreview();
}

function renderEditorPreview() {
    const preview = document.getElementById('pipe-preview-content');
    if (!preview) return;
    
    // Generate preview using editorStages (current edited config)
    const stageList = editorStages.map(s => s.id);
    let html = '<div class="pipeline-visual" style="margin:0"><div class="pipeline-stages">';
    
    stageList.forEach((stage, idx) => {
        const isLast = idx === stageList.length - 1;
        const hasFallback = fallbackRules[stage]?.enabled;
        const rule = fallbackRules[stage];
        // Only show fallback hint if target is also in current stageList
        const validFallback = hasFallback && stageList.includes(rule?.targetStageId);
        
        html += `
            <div class="pipeline-stage pending ${validFallback ? 'has-fallback-preview' : ''}">
                <div class="pipeline-stage-node" style="${validFallback ? 'border-color:var(--amber)' : ''}">
                    ${getStageIcon(stage)}
                </div>
                <div class="pipeline-stage-info">
                    <div class="psi-name">${esc(humanStage(stage))}</div>
                    <div class="psi-status pending">待处理</div>
                    ${validFallback ? `<div class="psi-fallback-hint">↩ ${esc(humanStage(rule.targetStageId))}</div>` : ''}
                </div>
            </div>
            ${!isLast ? '<div class="pipeline-stage-connector"><div class="connector-line"></div></div>' : ''}
        `;
    });
    
    html += '</div></div>';
    
    // Add summary - only count fallback rules for stages that exist in current editor
    const totalStages = stageList.length;
    const fallbackCount = stageList.filter(id => {
        const rule = fallbackRules[id];
        return rule?.enabled && stageList.includes(rule.targetStageId);
    }).length;
    html += `
        <div class="preview-summary">
            <span class="preview-stat"><strong>${totalStages}</strong> 个阶段</span>
            <span class="preview-stat"><strong>${fallbackCount}</strong> 个回退规则</span>
        </div>
    `;
    
    preview.innerHTML = html;
}

function drawFallbackArrows(arrows) {
    const svg = document.getElementById('pipe-fallback-svg');
    const canvas = document.getElementById('pipe-canvas');
    const flow = document.getElementById('pipe-flow');
    if (!svg || !canvas || !flow) return;

    // Get flow offset within canvas
    const flowOffsetTop = flow.offsetTop;
    const flowOffsetLeft = flow.offsetLeft;
    
    // Set SVG dimensions based on content
    const svgHeight = flow.offsetHeight + 100; // Extra space for curves below
    svg.style.width = canvas.scrollWidth + 'px';
    svg.style.height = svgHeight + 'px';
    
    let svgContent = '';
    
    arrows.forEach((arrow, arrowIdx) => {
        const fromNode = document.querySelector(`[data-index="${arrow.fromIdx}"]`);
        const toNode = document.querySelector(`[data-index="${arrow.toIdx}"]`);
        if (!fromNode || !toNode) return;
        
        const fromCard = fromNode.querySelector('.pipe-node-card');
        const toCard = toNode.querySelector('.pipe-node-card');
        if (!fromCard || !toCard) return;
        
        // Calculate positions using offsetLeft/offsetTop relative to canvas
        const fromX = fromNode.offsetLeft + fromNode.offsetWidth / 2 + flowOffsetLeft;
        const fromY = flowOffsetTop + fromNode.offsetTop + fromCard.offsetHeight + 15;
        const toX = toNode.offsetLeft + toNode.offsetWidth / 2 + flowOffsetLeft;
        const toY = flowOffsetTop + toNode.offsetTop + toCard.offsetHeight + 15;
        
        // Calculate curve - goes down, curves back, comes up
        const baseY = Math.max(fromY, toY);
        const midY = baseY + 25 + (arrowIdx * 18); // Stagger multiple arrows
        
        // SVG path: from source down, curve horizontally, up to target
        const path = `M ${fromX} ${fromY} 
                      L ${fromX} ${midY - 8}
                      Q ${fromX} ${midY}, ${fromX - 12} ${midY}
                      L ${toX + 12} ${midY}
                      Q ${toX} ${midY}, ${toX} ${midY - 8}
                      L ${toX} ${toY + 6}`;
        
        // Arrow head pointing up at target
        const arrowHead = `M ${toX - 4} ${toY + 10} L ${toX} ${toY + 3} L ${toX + 4} ${toY + 10}`;
        
        svgContent += `
            <g class="pipe-fallback-arrow-group" onclick="selectPipeStage('${arrow.fromId}')" style="cursor:pointer">
                <path d="${path}" style="stroke:var(--amber);stroke-width:2;fill:none;stroke-dasharray:6 4;animation:dash-flow 1s linear infinite"/>
                <path d="${arrowHead}" style="stroke:var(--amber);stroke-width:2;fill:var(--amber)"/>
                <title>失败回退: ${arrow.fromName} → ${arrow.toName} (最多重试 ${arrow.retries} 次)</title>
            </g>
        `;
        
        // Add label at the middle of the curve
        const labelX = (fromX + toX) / 2;
        const labelY = midY + 3;
        svgContent += `
            <foreignObject x="${labelX - 45}" y="${labelY - 8}" width="90" height="22">
                <div xmlns="http://www.w3.org/1999/xhtml" style="
                    background:var(--amber);
                    color:#fff;
                    font-size:9px;
                    font-weight:700;
                    padding:3px 8px;
                    border-radius:99px;
                    text-align:center;
                    white-space:nowrap;
                    box-shadow:0 2px 6px rgba(245,158,11,0.35);
                ">↩ ${arrow.retries}次重试</div>
            </foreignObject>
        `;
    });
    
    svg.innerHTML = svgContent;
}

function renderStageConfig(stageId) {
    const stage = editorStages.find(s => s.id === stageId);
    if (!stage) return '';
    
    const idx = editorStages.findIndex(s => s.id === stageId);
    const rule = fallbackRules[stageId] || { enabled: false, targetStageId: '', maxRetries: 3 };
    
    // Get stages that can be fallback targets (before current stage)
    const possibleTargets = editorStages.slice(0, idx);
    
    return `
        <div class="pipe-config-panel fade-in">
            <div class="pipe-config-header">
                <div class="pipe-config-title">${STAGE_ICONS[stageId] || '⚙️'} ${esc(stage.name)} 配置</div>
                <button class="pipe-config-close" onclick="closePipeConfig()">×</button>
            </div>
            <div class="pipe-config-body">
                <div class="pipe-config-section">
                    <div class="pipe-config-label">基本信息</div>
                    <div style="display:grid;gap:10px">
                        <div class="fallback-rule" style="border-color:var(--accent-soft)">
                            <div class="fallback-icon" style="background:var(--accent-soft);color:var(--accent)">⚙️</div>
                            <div class="fallback-content">
                                <div class="fallback-desc" style="color:var(--text-primary);font-weight:600">执行 Agent</div>
                                <div style="font-size:12px;color:var(--text-secondary)">${esc(stage.agent)}</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="pipe-config-section">
                    <div class="pipe-config-label">失败回退规则</div>
                    <div class="fallback-rules">
                        <div class="fallback-rule ${rule.enabled ? 'active' : ''}">
                            <div class="fallback-icon">↩</div>
                            <div class="fallback-content">
                                <div class="fallback-desc">当此阶段失败时，自动回退到指定阶段重试</div>
                                <div class="fallback-target">
                                    <span style="font-size:12px;color:var(--text-muted)">回退到：</span>
                                    <select class="fallback-select" onchange="updateFallbackTarget('${stageId}', this.value)" ${!possibleTargets.length ? 'disabled' : ''}>
                                        <option value="">不回退（直接失败）</option>
                                        ${possibleTargets.map(t => `
                                            <option value="${t.id}" ${rule.targetStageId === t.id ? 'selected' : ''}>${esc(t.name)}</option>
                                        `).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="fallback-toggle ${rule.enabled ? 'on' : ''}" onclick="toggleFallback('${stageId}')"></div>
                        </div>
                        
                        ${rule.enabled ? `
                        <div class="fallback-rule" style="padding:14px 16px">
                            <div class="retry-config">
                                <span class="retry-label">最大重试次数：</span>
                                <input type="number" class="retry-input" value="${rule.maxRetries}" min="1" max="10" 
                                       onchange="updateFallbackRetries('${stageId}', this.value)">
                                <span class="retry-label" style="color:var(--text-muted)">次后彻底失败</span>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                
                ${idx > 0 ? `
                <div class="pipe-config-section">
                    <div class="pipe-config-label">位置调整</div>
                    <div style="display:flex;gap:8px">
                        <button class="btn ghost sm" onclick="moveStage('${stageId}', -1)" ${idx === 0 ? 'disabled' : ''}>← 前移</button>
                        <button class="btn ghost sm" onclick="moveStage('${stageId}', 1)" ${idx === editorStages.length - 1 ? 'disabled' : ''}>后移 →</button>
                    </div>
                </div>
                ` : ''}
            </div>
        </div>
    `;
}

function selectPipeStage(stageId) {
    selectedStageId = stageId;
    renderPipelineEditor();
}

function closePipeConfig() {
    selectedStageId = null;
    renderPipelineEditor();
}

function toggleFallback(stageId) {
    if (!fallbackRules[stageId]) {
        fallbackRules[stageId] = { enabled: false, targetStageId: '', maxRetries: 3 };
    }
    fallbackRules[stageId].enabled = !fallbackRules[stageId].enabled;
    
    // If enabling, set default target to previous stage
    if (fallbackRules[stageId].enabled && !fallbackRules[stageId].targetStageId) {
        const idx = editorStages.findIndex(s => s.id === stageId);
        if (idx > 0) {
            fallbackRules[stageId].targetStageId = editorStages[idx - 1].id;
        }
    }
    renderPipelineEditor();
}

function updateFallbackTarget(stageId, targetId) {
    if (!fallbackRules[stageId]) {
        fallbackRules[stageId] = { enabled: false, targetStageId: '', maxRetries: 3 };
    }
    fallbackRules[stageId].targetStageId = targetId;
    fallbackRules[stageId].enabled = !!targetId;
    renderPipelineEditor();
}

function updateFallbackRetries(stageId, retries) {
    if (!fallbackRules[stageId]) return;
    fallbackRules[stageId].maxRetries = Math.max(1, Math.min(10, parseInt(retries) || 3));
}

function moveStage(stageId, direction) {
    const idx = editorStages.findIndex(s => s.id === stageId);
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= editorStages.length) return;
    
    const stage = editorStages.splice(idx, 1)[0];
    editorStages.splice(newIdx, 0, stage);
    
    // Update fallback rules that might be invalid after reorder
    Object.keys(fallbackRules).forEach(sid => {
        const rule = fallbackRules[sid];
        if (rule.enabled && rule.targetStageId) {
            const stageIdx = editorStages.findIndex(s => s.id === sid);
            const targetIdx = editorStages.findIndex(s => s.id === rule.targetStageId);
            if (targetIdx >= stageIdx) {
                rule.enabled = false;
                rule.targetStageId = '';
            }
        }
    });
    
    renderPipelineEditor();
}

function openAddStageModal() {
    const modal = document.getElementById('add-stage-modal');
    const body = document.getElementById('stage-options-body');
    const usedIds = new Set(editorStages.map(s => s.id));
    const available = ALL_STAGES.filter(s => !usedIds.has(s.id));
    
    if (!available.length) {
        alert('所有可用的 Stage 都已添加');
        return;
    }
    
    pendingAddStage = null;
    body.innerHTML = available.map(s => `
        <div class="stage-option" onclick="selectStageToAdd('${s.id}')">
            <div class="stage-option-icon">${s.icon || '⚙️'}</div>
            <div class="stage-option-info">
                <div class="stage-option-name">${esc(s.name)}</div>
                <div class="stage-option-agent">执行者: ${esc(s.agent)}</div>
            </div>
            <div class="stage-option-check">✓</div>
        </div>
    `).join('');
    
    modal.classList.add('open');
}

function selectStageToAdd(stageId) {
    pendingAddStage = stageId;
    document.querySelectorAll('.stage-option').forEach(el => el.classList.remove('selected'));
    document.querySelector(`.stage-option[onclick*="${stageId}"]`)?.classList.add('selected');
}

function closeAddStageModal() {
    const modal = document.getElementById('add-stage-modal');
    modal.classList.remove('open');
    pendingAddStage = null;
}

function confirmAddStage() {
    if (!pendingAddStage) {
        alert('请选择一个 Stage');
        return;
    }
    const stage = ALL_STAGES.find(s => s.id === pendingAddStage);
    if (stage) {
        editorStages.push({...stage});
        fallbackRules[stage.id] = { enabled: false, targetStageId: '', maxRetries: 3 };
    }
    closeAddStageModal();
    renderPipelineEditor();
}

function pipeRemove(idx) {
    const stageId = editorStages[idx]?.id;
    editorStages.splice(idx, 1);
    if (stageId) {
        delete fallbackRules[stageId];
        // Remove any fallback rules pointing to this stage
        Object.values(fallbackRules).forEach(rule => {
            if (rule.targetStageId === stageId) {
                rule.enabled = false;
                rule.targetStageId = '';
            }
        });
    }
    if (selectedStageId === stageId) selectedStageId = null;
    renderPipelineEditor();
}

function resetPipelineEditor() {
    editorStages = STAGES.map(id => {
        const stage = ALL_STAGES.find(s => s.id === id);
        return stage ? {...stage} : {id, name: id, agent: '-', icon: '⚙️'};
    });
    fallbackRules = {};
    editorStages.forEach(s => {
        fallbackRules[s.id] = { enabled: false, targetStageId: '', maxRetries: 3 };
    });
    if (fallbackRules.testing) {
        fallbackRules.testing = { enabled: true, targetStageId: 'development', maxRetries: 3 };
    }
    if (fallbackRules.code_review) {
        fallbackRules.code_review = { enabled: true, targetStageId: 'development', maxRetries: 2 };
    }
    selectedStageId = null;
    renderPipelineEditor();
}

async function savePipeline() {
    const stages = editorStages.map(s => ({
        id: s.id, 
        name: s.name, 
        agent: s.agent,
        fallback: fallbackRules[s.id] || { enabled: false, targetStageId: '', maxRetries: 3 }
    }));
    const r = await fetch('/api/pipeline', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({stages})
    });
    const data = await r.json();
    pipelineIsCustom = data.is_custom ?? true;
    pipelineFetched = true;
    
    // Update global STAGES to match editor (before fetchRuntime which would reset)
    STAGES = editorStages.map(s => s.id);
    
    // Mark as loaded so initPipelineEditor won't reset editorStages
    editorLoaded = true;
    
    await fetchRuntime();
    
    // Re-render the editor to update preview
    renderPipelineEditor();
    
    // Show brief confirmation
    showToast('Pipeline 配置已保存并生效');
}

function showToast(message, isError = false) {
    let toast = document.getElementById('toast-msg');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast-msg';
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius-md);font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.style.background = isError ? 'var(--rose)' : 'var(--green)';
    toast.style.color = '#fff';
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

async function restoreDefaultPipeline() {
    if (!confirm('确定要恢复系统默认 Pipeline 配置吗？')) return;
    await fetch('/api/pipeline/reset', {method:'POST'});
    pipelineIsCustom = false;
    pipelineFetched = true;
    
    // Reset STAGES to default
    STAGES = [...DEFAULT_STAGES];
    
    // Force editor to reload with default stages
    editorLoaded = false;
    
    await fetchRuntime();
    initPipelineEditor();
    showToast('已恢复默认 Pipeline 配置');
}

/* ── SSE ── */
function connectStream() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/stream');
    eventSource.onmessage = (msg) => {
        const ev = JSON.parse(msg.data);
        latestEvents.push(ev);
        latestEvents = latestEvents.slice(-200);
        // Throttle: batch SSE events, refresh at most every 2s
        if (!renderThrottleTimer) {
            renderThrottleTimer = setTimeout(async () => {
                renderThrottleTimer = null;
                await fetchRuntime();
            }, 2000);
        }
    };
    eventSource.onerror = () => setTimeout(connectStream, 3000);
}

/* ── Boot ── */
fetchRuntime().then(connectStream);
setInterval(fetchRuntime, 15000);
</script>
</body>
</html>
