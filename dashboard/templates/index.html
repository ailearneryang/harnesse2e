            cursor: pointer;
            color: var(--text-muted);
            background: transparent;
            border: none;
            transition: all var(--transition);
        }
        .pipe-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
        .pipe-tab.active { color: var(--accent); background: var(--accent-soft); }

        /* Flow Canvas */
        .pipe-canvas {
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            padding-bottom: 80px; /* Extra space for fallback arrows */
            min-height: 300px;
            position: relative;
            overflow-x: auto;
            overflow-y: visible;
        }
        .pipe-flow {
            display: flex;
            align-items: center;
            gap: 0;
            min-width: max-content;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }
        
        /* Stage Node */
        .pipe-node {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 140px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .pipe-node:hover .pipe-node-card { 
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--accent-soft);
        }
        .pipe-node.selected .pipe-node-card {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-md);
        }
        .pipe-node.has-fallback .pipe-node-card::after {
            content: '↩';
            position: absolute;
            top: -8px; right: -8px;
            width: 20px; height: 20px;
            background: var(--amber);
            color: #fff;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 10px;
            font-weight: 700;
        }
        .pipe-node-card {
            background: var(--bg-elevated);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            text-align: center;
            transition: all var(--transition);
            position: relative;
        }
        .pipe-node-num {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 24px; height: 24px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .pipe-node-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            margin-top: 4px;
        }
        .pipe-node-agent {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-base);
            padding: 3px 8px;
            border-radius: 99px;
        }
        .pipe-node-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .pipe-node:hover .pipe-node-actions { opacity: 1; }
        .pipe-node-btn {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-base);
            color: var(--text-muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 12px;
            transition: all var(--transition);
        }
        .pipe-node-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .pipe-node-btn.delete:hover { background: var(--rose-soft); color: var(--rose); border-color: var(--rose); }
        .pipe-node-btn.settings:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

        /* Connector Arrow */
        .pipe-connector {
            display: flex;
            align-items: center;
            padding: 0 8px;
            color: var(--border-strong);
            font-size: 18px;
            transition: color var(--transition);
        }
        .pipe-connector svg {
            width: 32px;
            height: 12px;
        }
        .pipe-connector path {
            stroke: var(--border-strong);
            stroke-width: 2;
            fill: none;
        }
        .pipe-node:hover + .pipe-connector path,
        .pipe-connector:has(+ .pipe-node:hover) path {
            stroke: var(--accent);
        }

        /* Fallback Arrow (curved return path) */
        .pipe-fallback-layer {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 1;
        }
        .pipe-fallback-layer g {
            pointer-events: auto;
        }
        .pipe-fallback-arrow path {
            stroke: var(--amber);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 6 4;
            animation: dash-flow 1s linear infinite;
        }
        .pipe-fallback-arrow:hover path {
            stroke-width: 3;
            filter: drop-shadow(0 0 6px var(--amber-glow));
        }
        .pipe-fallback-arrow polygon {
            fill: var(--amber);
        }
        .pipe-fallback-label {
            position: absolute;
            background: var(--amber);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 99px;
            white-space: nowrap;
            transform: translateX(-50%);
            box-shadow: 0 2px 8px var(--amber-glow);
        }
        @keyframes dash-flow {
            to { stroke-dashoffset: -10; }
        }

        /* Fallback Legend */
        .pipe-legend {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 16px;
            background: var(--bg-base);
            border-radius: var(--radius-md);
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .pipe-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pipe-legend-line {
            width: 24px;
            height: 2px;
            background: var(--border-strong);
        }
        .pipe-legend-line.fallback {
            background: var(--amber);
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                var(--amber) 0px,
                var(--amber) 6px,
                transparent 6px,
                transparent 10px
            );
        }
        
        /* Editor Preview Section */
        .pipe-preview-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px dashed var(--border);
        }
        .pipe-preview-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .pipe-preview-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .pipe-preview-hint {
            font-size: 11px;
            color: var(--text-muted);
        }
        .psi-fallback-hint {
            font-size: 9px;
            color: var(--amber);
            margin-top: 2px;
        }
        .preview-summary {
            display: flex;
            gap: 20px;
            padding: 12px 0;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .preview-stat strong {
            color: var(--accent);
            font-weight: 700;
        }

        /* Add Node Button */
        .pipe-add-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
            cursor: pointer;
        }
        .pipe-add-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px dashed var(--border-strong);
            background: var(--bg-base);
            color: var(--text-muted);
            display: grid;
            place-items: center;
            font-size: 20px;
            transition: all var(--transition);
        }
        .pipe-add-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
            transform: scale(1.1);
        }
        .pipe-add-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Stage Config Panel */
        .pipe-config-panel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .pipe-config-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pipe-config-title {
            font-size: 14px;
            font-weight: 700;
        }
        .pipe-config-close {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 16px;
            transition: all var(--transition);
        }
        .pipe-config-close:hover { background: var(--bg-hover); color: var(--text-primary); }
        .pipe-config-body {
            padding: 20px;
        }
        .pipe-config-section {
            margin-bottom: 20px;
        }
        .pipe-config-section:last-child { margin-bottom: 0; }
        .pipe-config-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        /* Fallback Rules */
        .fallback-rules {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .fallback-rule {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: all var(--transition);
        }
        .fallback-rule:hover { border-color: var(--border-strong); }
        .fallback-rule.active { border-color: var(--amber); background: var(--amber-soft); }
        .fallback-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--amber-soft);
            color: var(--amber);
            display: grid;
            place-items: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .fallback-content { flex: 1; min-width: 0; }
        .fallback-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .fallback-target {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fallback-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }
        .fallback-stage-tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 99px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-weight: 600;
        }
        .fallback-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-hover);
            border-radius: 99px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .fallback-toggle.on { background: var(--amber); }
        .fallback-toggle::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 18px; height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: all var(--transition);
        }
        .fallback-toggle.on::after { left: 23px; }
        .fallback-select {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 12px;
            min-width: 140px;
        }
        .fallback-select:focus { outline: none; border-color: var(--accent); }

        /* Retry Config */
        .retry-config {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .retry-input {
            width: 60px;
            padding: 8px 12px;
            text-align: center;
        }
        .retry-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Add Stage Modal */
        .pipe-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .pipe-modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .pipe-modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 480px;
            max-width: 90vw;
            max-height: 80vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform var(--transition);
        }
        .pipe-modal-overlay.open .pipe-modal {
            transform: scale(1);
        }
        .pipe-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pipe-modal-title {
            font-size: 16px;
            font-weight: 700;
        }
        .pipe-modal-body {
            padding: 20px 24px;
            max-height: 400px;
            overflow-y: auto;
        }
        .pipe-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .stage-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .stage-option:hover { border-color: var(--accent); background: var(--accent-soft); }
        .stage-option.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .stage-option-icon {
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            background: var(--bg-base);
            display: grid;
            place-items: center;
            font-size: 18px;
        }
        .stage-option-info { flex: 1; min-width: 0; }
        .stage-option-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
        .stage-option-agent { font-size: 11px; color: var(--text-muted); }
        .stage-option-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: grid;
            place-items: center;
            color: transparent;
            transition: all var(--transition);
        }
        .stage-option.selected .stage-option-check {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── Tabs (Enhanced) ── */
        .tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--bg-base); padding: 4px; border-radius: var(--radius-md); }
        .tab {
            padding: 10px 18px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 600; cursor: pointer;
            color: var(--text-muted); background: transparent;
            border: none; transition: all var(--transition);
        }
        .tab:hover { color: var(--text-primary); background: var(--bg-hover); }
        .tab.active { 
            color: var(--accent); 
            background: var(--accent-soft);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* ── Animations ── */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        /* ── Tooltips ── */
        [data-tooltip] {
            position: relative;
        }
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%; left: 50%;
            transform: translateX(-50%);
            padding: 6px 10px;
            background: var(--bg-active);
            color: var(--text-primary);
            font-size: 11px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition);
            z-index: 100;
        }
        [data-tooltip]:hover::after {
            opacity: 1;
            bottom: calc(100% + 6px);
        }

        /* ── Responsive (Enhanced) ── */
        @media (max-width: 1400px) {
            .metrics { grid-template-columns: repeat(3,1fr); }
            .metric-card.token-card { grid-column: span 1; }
            .two-col { grid-template-columns: 1fr; }
            .three-col { grid-template-columns: 1fr 1fr; }
            .kanban { grid-template-columns: repeat(2,1fr); }
            .focus-grid { grid-template-columns: 1fr; }
            .mission-hero { grid-template-columns: 1fr; }
            .progress-ring-card { flex-direction: row; padding: 16px 20px; }
            .progress-ring-container { width: 100px; height: 100px; }
            .progress-ring { width: 100px; height: 100px; }
            .progress-ring-pct { font-size: 24px; }
            .progress-stats { flex: 1; grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 1100px) {
            /* Content area adjustments only - sidebar controlled by JS */
            .three-col { grid-template-columns: 1fr; }
            .progress-ring-card { flex-direction: column; }
            .progress-stats { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; 
                left: 0; top: 0; 
                width: var(--sidebar-width) !important;
                min-width: var(--sidebar-width) !important;
                max-width: var(--sidebar-width) !important;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform var(--transition);
            }
            .shell.sidebar-open .sidebar { transform: translateX(0); }
            .mobile-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                opacity: 0;
                pointer-events: none;
                transition: opacity var(--transition);
            }
            .shell.sidebar-open .mobile-overlay {
                opacity: 1;
                pointer-events: auto;
            }
            .page { padding: 16px; }
            .metrics { grid-template-columns: repeat(2,1fr); }
            .kanban { grid-template-columns: 1fr; }
            .agent-grid { grid-template-columns: 1fr; }
            .task-detail-grid { grid-template-columns: 1fr; }
            .composer-row { grid-template-columns: 1fr; }
            .composer-actions { flex-wrap: wrap; }
            .pipeline-current-banner {
                flex-direction: column;
                align-items: flex-start;
            }
            .pipeline-current-meta {
                justify-content: flex-start;
            }
            .pipeline-current-detail-grid {
                grid-template-columns: 1fr;
            }
            .mission-status-bar { flex-wrap: wrap; gap: 8px; }
            .tab-bar { padding: 0 8px; }
            .tab-item { padding: 8px 10px; max-width: 120px; }
            .tab-bar-actions { padding-left: 8px; }
            .mobile-menu-btn { display: flex !important; }
        }
        
        .mobile-menu-btn {
            display: none;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div id="app" class="shell">
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" onclick="toggleMobileSidebar()"></div>
</div>
<script>
/* ══════════════════════════════════════════════════════════════
   HARNESS CONSOLE - B端 SPA 架构重构版
   特性：
   - 多标签页系统（类似浏览器 tabs）
   - 左侧可折叠导航（类似飞书/Jira）
   - 独立页面路由（非锚点滚动）
   - 响应式设计 + 小屏自动折叠
   ══════════════════════════════════════════════════════════════ */

/* ── State ── */
let runtime = null;
let eventSource = null;
let latestEvents = [];
let feedFilter = 'all';
let artifactTaskId = '';
let artifactCache = {};
let openArtifacts = new Set();
const RUNTIME_POLL_INTERVAL_MS = 60000;
let needsVisibilitySync = false;
let lastRuntimeSyncAt = null;
let pendingRequestFiles = [];
let requestFileInput = null;
const REQUEST_FILE_ACCEPT = '.txt,.md,.markdown,.rst,.log,.json,.yaml,.yml,.xml,.csv,.tsv,.html,.htm,.ini,.cfg,.conf,.toml,.py,.js,.ts,.tsx,.jsx,.java,.go,.rs,.sh,.sql,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.gif,.webp';

/* ── Tab & Navigation State ── */
let sidebarCollapsed = false;
let openTabs = [{ id: 'dashboard', label: '总览', icon: '📊' }];
let activeTabId = 'dashboard';
let pageTransitionEnabled = false;

/* ── Page Definitions ── */
const PAGES = {
    'dashboard': { label: '总览 Dashboard', icon: '📊', group: 'main' },
    'mission': { label: '任务中心', icon: '🎯', group: 'main' },
    'pipeline': { label: 'Pipeline 编排', icon: '🔧', group: 'main' },
    'tasks': { label: '任务看板', icon: '📋', group: 'main' },
    'approvals': { label: '审批中心', icon: '✅', group: 'main' },
    'agents': { label: 'Agent 团队', icon: '🤖', group: 'main' },
    'artifacts': { label: '产物查看', icon: '📦', group: 'data' },
    'history': { label: '历史记录', icon: '📜', group: 'data' },
    'events': { label: '事件流', icon: '⚡', group: 'data' },
};

/* ── Helpers ── */
const esc = v => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const humanStage = s => String(s||'pending').replace(/_/g,' ');
const DEFAULT_STAGES = ['intake','planning','requirements','design','development','code_review','security_review','testing','delivery'];
let STAGES = DEFAULT_STAGES;
let SAVED_PIPELINE_STAGES = null;

function formatRequestFileSize(bytes) {
    const value = Number(bytes) || 0;
    if (value < 1024) return `${value} B`;
    if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
    return `${(value / (1024 * 1024)).toFixed(1)} MB`;
}

function renderSelectedRequestFiles() {
    if (!pendingRequestFiles.length) {
        return `<div class="request-file-empty">未选择文件。可直接提交文字请求，或附加常见文档、表格、图片和代码文件。</div>`;
    }
    return pendingRequestFiles.map((file, index) => `
        <div class="request-file-item">
            <div class="request-file-meta">
                <div class="request-file-name">${esc(file.name)}</div>
                <div class="request-file-desc">${formatRequestFileSize(file.size)}${file.type ? ` · ${esc(file.type)}` : ''}</div>
            </div>
            <button class="btn ghost sm" onclick="removePendingRequestFile(${index})">移除</button>
        </div>
    `).join('');
}

function ensureRequestFileInput() {
    if (requestFileInput) return requestFileInput;
    requestFileInput = document.createElement('input');
    requestFileInput.type = 'file';
    requestFileInput.accept = REQUEST_FILE_ACCEPT;
    requestFileInput.multiple = true;
    requestFileInput.style.display = 'none';
    requestFileInput.addEventListener('change', (event) => {
        const files = Array.from(event.target.files || []);
        pendingRequestFiles = files;
        const list = document.getElementById('req-file-list');
        if (list) list.innerHTML = renderSelectedRequestFiles();
        event.target.value = '';
    });
    document.body.appendChild(requestFileInput);
    return requestFileInput;
}

function openRequestFilePicker() {
    ensureRequestFileInput().click();
}

function removePendingRequestFile(index) {
    pendingRequestFiles.splice(index, 1);
    const list = document.getElementById('req-file-list');
    if (list) list.innerHTML = renderSelectedRequestFiles();
}

function clearPendingRequestFiles() {
    pendingRequestFiles = [];
    const list = document.getElementById('req-file-list');
    if (list) list.innerHTML = renderSelectedRequestFiles();
}

function toStageId(stage) {
    return typeof stage === 'string' ? stage : stage?.id;
}

function pipelineStageIds(stages) {
    return (stages || []).map(toStageId).filter(Boolean);
}

function taskPipelineStageIds(task) {
    if (task?.pipeline_snapshot?.length) return pipelineStageIds(task.pipeline_snapshot);
    return STAGES;
}

function statusCls(s) { return s || 'pending'; }
function completedCount(task) { 
    const pipelineStages = taskPipelineStageIds(task);
    return pipelineStages.filter(stageId => {
        const stageData = task?.stages?.[stageId];
        return stageData && ['passed','completed'].includes(stageData.status);
    }).length;
}
function taskPct(task) {
    if (!task) return 0;
    const pipelineStages = taskPipelineStageIds(task);
    const total = pipelineStages.length || 1;
    return Math.min(100, Math.round(completedCount(task) / total * 100));
}
function getTaskStageCount(task) {
    return taskPipelineStageIds(task).length;
}
function classifyTask(t) {
    const s = (t?.status||'').toLowerCase(), st = (t?.current_stage||'').toLowerCase();
    if (s==='completed'||s==='done') return 'done';
    if (s==='failed'||s==='error') return 'attention';
    if (s==='waiting_human'||st.includes('review')||st==='testing'||st==='delivery') return 'review';
    return 'progress';
}
function fmtTime(ts) {
    if (!ts) return '-';
    try { const d = new Date(ts); return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch(e) { return ts; }
}
function fmtTokens(n) {
    if (!n || n === 0) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
}
function tokenStatusCls(status) {
    if (status === 'exceeded') return 'failed';
    if (status === 'warning') return 'waiting';
    return 'done';
}

/* ── Status Display Helpers ── */
const STAGE_ICONS = {
    intake: '📥', planning: '📋', requirements: '📝', design: '🏗️',
    development: '💻', code_review: '👁️', security_review: '🔒',
    safety_review: '🛡️', testing: '🧪', build_verification: '🔧', delivery: '🚀'
};
function getStageIcon(stage) { return STAGE_ICONS[stage] || '⚙️'; }

function getStatusIcon(status) {
    const s = String(status||'pending').toLowerCase();
    if (['completed','done','passed'].includes(s)) return '✓';
    if (['failed','error'].includes(s)) return '✗';
    if (['running','in_progress'].includes(s)) return '▶';
    if (['waiting_human'].includes(s)) return '⏸';
    return '○';
}

function getStatusText(status) {
    const s = String(status||'').toLowerCase();
    if (!s || s==='pending') return '待处理';
    if (['completed','done'].includes(s)) return '已完成';
    if (s==='passed') return '已通过';
    if (['running','in_progress'].includes(s)) return '进行中';
    if (['waiting','waiting_human'].includes(s)) return '等待审批';
    if (['failed','error'].includes(s)) return '失败';
    if (s==='idle') return '空闲';
    return s;
}

function fmtDuration(startStr, endStr) {
    if (!startStr) return '';
    const start = new Date(startStr);
    const end = endStr ? new Date(endStr) : new Date();
    const sec = Math.round((end - start) / 1000);
    if (sec < 60) return `${sec}s`;
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    if (min < 60) return `${min}m${s}s`;
    return `${Math.floor(min/60)}h${min%60}m`;
}

function taskDuration(task) {
    if (!task?.started_at) return '—';
    const start = new Date(task.started_at).getTime();
    let end;
    if (task.completed_at) {
        end = new Date(task.completed_at).getTime();
    } else if (task.status === 'failed' || task.status === 'completed') {
        const stages = task.stages || {};
        let lastEnd = null;
        for (const s of Object.values(stages)) {
            if (s.ended_at) {
                const d = new Date(s.ended_at).getTime();
                if (!lastEnd || d > lastEnd) lastEnd = d;
            }
        }
        end = lastEnd || new Date(task.updated_at || task.started_at).getTime();
    } else {
        end = Date.now();
    }
    const sec = Math.round((end - start) / 1000);
    if (sec < 60) return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec/60)}m ${sec%60}s`;
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
    return `${h}h ${m}m`;
}

function stageDuration(stageData, taskStatus) {
    if (!stageData?.started_at) return '';
    const start = new Date(stageData.started_at).getTime();
    let end;
    if (stageData.completed_at || stageData.ended_at) {
        end = new Date(stageData.completed_at || stageData.ended_at).getTime();
    } else if (stageData.status === 'failed' || stageData.status === 'passed' || 
               taskStatus === 'failed' || taskStatus === 'completed') {
        end = new Date(stageData.started_at).getTime();
    } else {
        end = Date.now();
    }
    const sec = Math.round((end - start) / 1000);
    if (sec < 60) return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec/60)}m ${sec%60}s`;
    return `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}m`;
}

/* ══════════════════════════════════════════════════════════════
   TAB & NAVIGATION SYSTEM
   ══════════════════════════════════════════════════════════════ */

function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    const shell = document.getElementById('app');
    shell.classList.toggle('sidebar-collapsed', sidebarCollapsed);
    localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
}

function enableNextPageTransition() {
    pageTransitionEnabled = true;
}

function toggleMobileSidebar() {
    const shell = document.getElementById('app');
    shell.classList.toggle('sidebar-open');
}

function buildNavItems(tasks, approvals, agents) {
    return [
        { group: 'main', label: '主控', items: [
            { id: 'dashboard', icon: '📊', label: '总览', count: '' },
            { id: 'mission', icon: '🎯', label: '任务中心', count: '' },
            { id: 'pipeline', icon: '🔧', label: 'Pipeline', count: '' },
            { id: 'tasks', icon: '📋', label: '看板', count: tasks.length },
            { id: 'approvals', icon: '✅', label: '审批', count: approvals.length },
        ]},
        { group: 'team', label: '团队', items: [
            { id: 'agents', icon: '🤖', label: 'Agents', count: agents.length },
        ]},
        { group: 'data', label: '数据', items: [
            { id: 'artifacts', icon: '📦', label: '产物', count: '' },
            { id: 'history', icon: '📜', label: '历史', count: '' },
            { id: 'events', icon: '⚡', label: '事件', count: latestEvents.length },
        ]},
    ];
}

function getRuntimeContext() {
    if (!runtime) return null;

    const tasks = runtime.tasks || [];
    const approvals = runtime.approvals || [];
    const agents = runtime.agents || [];
    const stats = runtime.stats || {};
    const runner = runtime.runner || {};
    const settings = runtime.settings || {};

    if (!editorLoaded) {
        STAGES = pipelineStageIds(SAVED_PIPELINE_STAGES?.length ? SAVED_PIPELINE_STAGES : (runtime.pipeline_order || DEFAULT_STAGES));
    }

    const activeTask = tasks.find(t => t.id === runner.current_task_id) || tasks[0];
    const budget = runtime.budget || {used: 0, limit: 500000, percent: 0, status: 'ok'};
    const isLive = runner.running && !runner.paused;
    const isPaused = runner.paused;
    const navItems = buildNavItems(tasks, approvals, agents);

    return { tasks, approvals, agents, stats, runner, settings, activeTask, budget, isLive, isPaused, navItems };
}

function renderRunnerWidget(activeTask, isLive, isPaused) {
    return `
        <div class="runner-row">
            <span class="dot ${isLive?'live':(isPaused?'paused':'')}"></span>
            <span class="runner-label">${isPaused?'Runner Paused':(isLive?'Runner Live':'Runner Stopped')}</span>
        </div>
        <div class="runner-detail">${activeTask ? esc(activeTask.title||'Untitled') : '暂无活动任务'}</div>
        <div class="runner-btns">
            <button class="btn primary sm" onclick="controlRunner('resume')">恢复</button>
            <button class="btn warn sm" onclick="controlRunner('pause')">暂停</button>
        </div>
    `;
}

function renderNavSection(navItems) {
    return navItems.map(group => `
        <div class="nav-group">
            <div class="nav-label">${group.label}</div>
            ${group.items.map(n => `
                <a class="nav-link ${activeTabId===n.id?'active':''}" onclick="openPage('${n.id}')">
                    <span class="nav-link-icon">${n.icon}</span>
                    <span class="nav-link-text">${n.label}</span>
                    ${n.count!==''?`<span class="count">${n.count}</span>`:''}
                </a>
            `).join('')}
        </div>
    `).join('');
}

function renderSidebarFooter(settings, runner) {
    const displayTime = lastRuntimeSyncAt || runner.updated_at;
    const configuredRepo = settings.target_repo || '-';
    const resolvedRepo = runtime?.resolved_target_repo || configuredRepo;
    const showResolvedRepo = resolvedRepo && resolvedRepo !== configuredRepo;
    return `
        <div class="info-row"><span>Target Repo</span><span class="info-val">${esc(configuredRepo)}</span></div>
        ${showResolvedRepo ? `<div class="info-row"><span>Resolved</span><span class="info-val">${esc(resolvedRepo)}</span></div>` : ''}
        <div class="info-row"><span>Claude</span><span class="info-val">${settings.claude?.simulate?'Simulation':'CLI'}</span></div>
        <div class="info-row"><span>Synced</span><span class="info-val">${fmtTime(displayTime)}</span></div>
    `;
}

function setFeedFilter(filter) {
    if (feedFilter === filter) return;
    feedFilter = filter;
    updateRuntimeUI({ animate: false });
}

function openPage(pageId, addTab = true) {
    if (!PAGES[pageId]) return;
    
    // Add tab if not exists
    if (addTab && !openTabs.find(t => t.id === pageId)) {
        openTabs.push({ id: pageId, label: PAGES[pageId].label.split(' ')[0], icon: PAGES[pageId].icon });
    }
    
    activeTabId = pageId;
    
    // Close mobile sidebar
    document.getElementById('app')?.classList.remove('sidebar-open');
    
    // Lazy load page content
    if (pageId === 'history' && !historyData) {
        loadHistory();
    }
    
    enableNextPageTransition();
    renderApp();
}

function closeTab(tabId, event) {
    if (event) event.stopPropagation();
    
    const idx = openTabs.findIndex(t => t.id === tabId);
    if (idx === -1 || openTabs.length === 1) return;
    
    openTabs.splice(idx, 1);
    
    // If closing active tab, switch to adjacent tab
    if (activeTabId === tabId) {
        activeTabId = openTabs[Math.min(idx, openTabs.length - 1)].id;
    }
    
    enableNextPageTransition();
    renderApp();
}

function switchTab(tabId) {
    if (activeTabId === tabId) return;
    activeTabId = tabId;
    enableNextPageTransition();
    renderApp();
}

function renderPipelineVisual(task) {
    const stages = task?.stages || {};
    const currentStage = task?.current_stage || '';
    const taskStatus = task?.status || '';
    
    // Use task's pipeline_snapshot if available, otherwise fall back to global STAGES
    const stageList = taskPipelineStageIds(task);
    
    // If no task or empty pipeline, show empty state
    if (!task || stageList.length === 0) {
        return `<div class="pipeline-visual pipeline-empty">
            <div class="pipeline-empty-icon">📋</div>
            <div class="pipeline-empty-text">暂无活动任务</div>
            <div class="pipeline-empty-hint">提交新请求开始任务流程</div>
        </div>`;
    }
    
    // Determine display mode based on task status
    const isCompleted = ['completed', 'done'].includes(taskStatus);
    const isFailed = ['failed', 'error'].includes(taskStatus);
    const isRunning = ['running', 'in_progress'].includes(taskStatus);
    const currentStageData = stages[currentStage] || {};
    const currentStageIndex = Math.max(stageList.indexOf(currentStage), 0);
    const currentStageStatus = currentStageData.status || (isCompleted ? 'completed' : (isFailed ? 'failed' : (currentStage ? 'running' : 'pending')));
    const currentStageDuration = stageDuration(currentStageData, taskStatus) || taskDuration(task);
    const completedStages = completedCount(task);
    const activeAgent = (runtime?.agents || []).find(agent => agent.current_task_id === task?.id && agent.last_stage === currentStage)
        || (runtime?.agents || []).find(agent => agent.current_task_id === task?.id)
        || (runtime?.agents || []).find(agent => agent.last_stage === currentStage);
    const taskEvents = [...latestEvents]
        .reverse()
        .filter(event => event.task_id === task?.id && (!currentStage || event.stage === currentStage || !event.stage))
        .slice(0, 3);
    const latestTaskEvent = taskEvents[0];
    const currentSummary = currentStageData.summary || currentStageData.last_message || task?.request_text || '';
    const summaryPreview = currentSummary.length > 160 ? `${currentSummary.slice(0, 160)}...` : currentSummary;
    
    let html = '<div class="pipeline-visual">';
    
    // Status header for completed/failed tasks
    if (isCompleted || isFailed) {
        const statusIcon = isCompleted ? '✓' : '✗';
        const statusText = isCompleted ? '任务已完成' : '任务失败';
        const statusClass = isCompleted ? 'completed' : 'failed';
        const retryBtn = isFailed ? `<button class="psh-retry-btn" onclick="retryTask('${task.id}')" title="重试任务">🔄 重试</button>` : '';
        html += `<div class="pipeline-status-header ${statusClass}">
            <span class="psh-icon">${statusIcon}</span>
            <span class="psh-text">${statusText}</span>
            <span class="psh-time">${taskDuration(task)}</span>
            ${retryBtn}
        </div>`;
    }
    
    // Check for active fallback (a stage that was passed but now we're at an earlier stage)
    let fallbackInfo = null;
    const currentIdx = stageList.indexOf(currentStage);
    for (let i = currentIdx + 1; i < stageList.length; i++) {
        const stageData = stages[stageList[i]] || {};
        const retries = stageData.retry_count || stageData.attempts || 0;
        if (retries > 1 || ['failed','error'].includes(stageData.status)) {
            fallbackInfo = { from: stageList[i], fromIdx: i, to: currentStage, toIdx: currentIdx };
            break;
        }
    }
    
    // Fallback indicator banner (only for running tasks)
    if (fallbackInfo && isRunning) {
        html += `<div class="pipeline-fallback-banner">
            <span class="pfb-icon">↩</span>
            <span class="pfb-text">回退执行: <strong>${esc(humanStage(fallbackInfo.from))}</strong> → <strong>${esc(humanStage(fallbackInfo.to))}</strong></span>
        </div>`;
    }

    if (currentStage) {
        html += `<div class="pipeline-current-banner">
            <div class="pipeline-current-main">
                <div class="pipeline-current-icon">${getStageIcon(currentStage)}</div>
                <div class="pipeline-current-copy">
                    <div class="pipeline-current-kicker">当前步骤</div>
                    <div class="pipeline-current-title">${esc(humanStage(currentStage))}</div>
                    <div class="pipeline-current-subtitle">${esc(task.title || 'Untitled')} · ${getStatusText(currentStageStatus)}</div>
                </div>
            </div>
            <div class="pipeline-current-meta">
                <span class="pipeline-current-chip">位置 <strong>${currentStageIndex + 1} / ${stageList.length}</strong></span>
                <span class="pipeline-current-chip">已完成 <strong>${completedStages}</strong></span>
                <span class="pipeline-current-chip">耗时 <strong>${esc(currentStageDuration || '—')}</strong></span>
            </div>
        </div>`;
        html += `<div class="pipeline-current-detail-grid">
            <div class="pipeline-current-detail">
                <div class="pipeline-current-detail-label">当前 Agent</div>
                <div class="pipeline-current-detail-value">${esc(activeAgent?.name || activeAgent?.id || '未分配')}</div>
                <div class="pipeline-current-detail-text ${activeAgent?.last_message ? '' : 'muted'}">${esc(activeAgent?.last_message || activeAgent?.role || '当前还没有 agent 动态')}</div>
            </div>
            <div class="pipeline-current-detail">
                <div class="pipeline-current-detail-label">最近事件</div>
                <div class="pipeline-current-detail-value">${taskEvents.length ? `最近 ${taskEvents.length} 条` : '暂无事件'}</div>
                ${taskEvents.length ? `<div class="pipeline-current-event-list">${taskEvents.map(event => `
                    <div class="pipeline-current-event-item">
                        <div class="pipeline-current-event-top">
                            <span class="pipeline-current-event-source">${esc(event.source || 'system')}</span>
                            <span>${fmtTime(event.timestamp)}</span>
                        </div>
                        <div class="pipeline-current-event-msg">${esc(event.message || '')}</div>
                    </div>
                `).join('')}</div>` : `<div class="pipeline-current-detail-text muted">等待下一条 runtime event</div>`}
            </div>
            <div class="pipeline-current-detail">
                <div class="pipeline-current-detail-label">当前摘要</div>
                <div class="pipeline-current-detail-value">${esc(getStatusText(currentStageStatus))}</div>
                <div class="pipeline-current-detail-text ${summaryPreview ? '' : 'muted'}">${esc(summaryPreview || '当前步骤还没有产出摘要，通常表示执行刚开始。')}</div>
            </div>
        </div>`;
    }
    
    html += '<div class="pipeline-stages">';
    
    stageList.forEach((stage, idx) => {
        const stageData = stages[stage] || {};
        const status = stageData.status || 'pending';
        const isCurrent = stage === currentStage;
        const isLast = idx === stageList.length - 1;
        const duration = stageDuration(stageData, taskStatus);
        // Support both retry_count (state_machine) and attempts (pipeline_runner)
        const retryCount = Math.max((stageData.retry_count || 0), (stageData.attempts || 0) - 1, 0);
        
        // Check if this stage is the source of a fallback
        const isFallbackSource = fallbackInfo?.from === stage;
        
        // Determine node status class
        let nodeStatus = 'pending';
        if (['completed','done','passed'].includes(status)) nodeStatus = 'passed';
        else if (['failed','error'].includes(status)) nodeStatus = 'failed';
        else if (['running','in_progress'].includes(status) || isCurrent) nodeStatus = 'running';
        else if (['waiting','waiting_human'].includes(status)) nodeStatus = 'waiting_human';
        
        // Show retry button for failed stages when task is also failed
        const showRetry = nodeStatus === 'failed' && isFailed;
        
        html += `
            <div class="pipeline-stage ${nodeStatus} ${isCurrent ? 'current' : ''} ${isFallbackSource ? 'fallback-source' : ''}">
                <div class="pipeline-stage-node">
                    ${getStageIcon(stage)}
                    ${retryCount > 0 ? `<span class="retry-badge" title="已重试 ${retryCount} 次">${retryCount}</span>` : ''}
                    ${showRetry ? `<button class="stage-retry-btn" onclick="event.stopPropagation();retryTask('${task.id}')" title="从此阶段重试">↻</button>` : ''}
                </div>
                <div class="pipeline-stage-info">
                    <div class="psi-name">${esc(humanStage(stage))}</div>
                    <div class="psi-status ${nodeStatus}">${getStatusText(status)}${retryCount > 0 ? ` · 重试${retryCount}` : ''}</div>
                    ${duration ? `<div class="psi-time">${duration}</div>` : ''}
                </div>
            </div>
            ${!isLast ? '<div class="pipeline-stage-connector"><div class="connector-line"></div></div>' : ''}
        `;
    });
    
    html += '</div></div>';
    return html;
}

async function fetchRuntime(options = {}) {
    const { animate = false, partial = true, forceFullRender = false } = options;
    const r = await fetch('/api/runtime');
    runtime = await r.json();
    lastRuntimeSyncAt = new Date().toISOString();
    latestEvents = mergeEvents(latestEvents, runtime.events || []);
    // Fetch pipeline config only once
    if (!pipelineFetched) {
        try {
            const pr = await fetch('/api/pipeline');
            const pd = await pr.json();
            pipelineIsCustom = pd.is_custom ?? false;
            SAVED_PIPELINE_STAGES = pd.stages || [];
            STAGES = pipelineStageIds(SAVED_PIPELINE_STAGES.length ? SAVED_PIPELINE_STAGES : (pd.order || DEFAULT_STAGES));
            pipelineFetched = true;
        } catch(e) {}
    }
    if (forceFullRender || !document.getElementById('page-container') || !partial) {
        renderApp({ animate });
        return;
    }
    updateRuntimeUI({ animate });
}

function mergeEvents(existingEvents, incomingEvents) {
    const merged = new Map();
    [...(existingEvents || []), ...(incomingEvents || [])].forEach((event) => {
        if (!event || typeof event.seq !== 'number') return;
        merged.set(event.seq, event);
    });
    return [...merged.values()]
        .sort((left, right) => left.seq - right.seq)
        .slice(-200);
}

async function submitRequest() {
    const title = document.getElementById('req-title')?.value.trim();
    const text = document.getElementById('req-text')?.value.trim();
    const source = document.getElementById('req-source')?.value.trim() || 'web';
    if (!text && !pendingRequestFiles.length) { showToast('请输入需求内容或上传文件', true); return; }
    
    const btn = document.querySelector('.composer-actions .btn.primary');
    if (btn) btn.classList.add('loading');
    
    try {
        let response;
        if (pendingRequestFiles.length) {
            const formData = new FormData();
            if (title) formData.append('title', title);
            if (text) formData.append('text', text);
            formData.append('source', source);
            pendingRequestFiles.forEach(file => formData.append('files', file, file.name));
            response = await fetch('/api/requests', { method:'POST', body: formData });
        } else {
            response = await fetch('/api/requests', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({title,text,source}),
            });
        }

        if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || '提交失败');
        }

        const titleEl = document.getElementById('req-title');
        const textEl = document.getElementById('req-text');
        if (titleEl) titleEl.value = '';
        if (textEl) textEl.value = '';
        clearPendingRequestFiles();
        showToast('请求已提交');
        await fetchRuntime();
    } catch (e) {
        showToast(e.message || '提交失败', true);
    } finally {
        if (btn) btn.classList.remove('loading');
    }
}

async function controlRunner(action) { 
    await fetch(`/api/control/${action}`,{method:'POST'}); 
    showToast(action === 'resume' ? 'Runner 已恢复' : 'Runner 已暂停');
    await fetchRuntime(); 
}

async function resolveApproval(taskId, approvalId, resolution) {
    await fetch(`/api/approvals/${taskId}/${approvalId}/resolve`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({resolution}) });
    showToast(resolution === 'approved' ? '已批准' : '已拒绝');
    await fetchRuntime();
}

async function retryTask(taskId) {
    try {
        const r = await fetch(`/api/tasks/${taskId}/retry`, { method:'POST' });
        if (r.ok) {
            showToast('任务已重新加入队列');
        } else {
            const data = await r.json().catch(() => ({}));
            showToast(data.error || '重试失败', true);
        }
    } catch (e) {
        showToast('重试请求失败', true);
    }
    await fetchRuntime();
}

async function deleteTask(taskId) {
    if (!confirm('确定删除这个任务？')) return;
    await fetch(`/api/tasks/${taskId}`, { method:'DELETE' });
    showToast('任务已删除');
    await fetchRuntime();
}

/* ── Sub-renderers ── */
function fmtDurationSec(sec) {
    if (!sec || sec <= 0) return '-';
    if (sec < 60) return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec/60)}m ${sec%60}s`;
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
    return `${h}h ${m}m`;
}

function fmtTokensK(tokens) {
    if (!tokens || tokens <= 0) return '-';
    if (tokens < 1000) return String(tokens);
    return `${(tokens/1000).toFixed(1)}k`;
}

function renderPipeline(task) {
    if (!task) return '<div class="empty">暂无活动任务</div>';
    const stageMap = task.stages || {};
    return `<div class="pipeline">${STAGES.map((s,i) => {
        const item = stageMap[s] || {status:'pending'};
        const dur = (item.started_at && item.status !== 'pending') ? fmtDuration(item.started_at, item.ended_at) : '';
        return `<div class="stage-step ${statusCls(item.status)} ${item.status==='running'?'pulse':''}">
            <div class="stage-num">${i+1}</div>
            <div class="stage-name">${esc(humanStage(s))}</div>
            <div class="stage-status-tag">${esc(item.status||'pending')}${dur ? ' · '+dur : ''}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderKanban(tasks) {
    if (!tasks.length) return '<div class="empty">还没有任务。先提交一个请求。</div>';
    const cols = [
        {key:'progress',title:'进行中',cls:'progress'},
        {key:'review',title:'待审批',cls:'review'},
        {key:'done',title:'已完成',cls:'done'},
        {key:'attention',title:'需关注',cls:'attention'}
    ];
    const grouped = {}; cols.forEach(c=>grouped[c.key]=[]);
    tasks.forEach(t=>grouped[classifyTask(t)].push(t));
    return `<div class="kanban">${cols.map(col => {
        const items = grouped[col.key];
        return `<div class="kanban-col ${col.cls}">
            <div class="kanban-col-head"><span class="kanban-col-title">${col.title}</span><span class="kanban-col-count">${items.length}</span></div>
            <div class="kanban-cards">${items.length ? items.map(t => {
                const p = taskPct(t);
                const badges = Object.entries(t.stages||{}).filter(([,v])=>v.status&&v.status!=='pending').slice(-3).map(([s,v])=>`<span class="badge ${statusCls(v.status)}">${esc(humanStage(s))}</span>`).join('');
                return `<div class="task-card ${statusCls(t.status)}">
                    <div class="task-card-head"><div><div class="task-card-title">${esc(t.title||'Untitled')}</div><div class="task-card-sub">${esc(t.source||'unknown')} · ${esc(humanStage(t.current_stage||'queued'))}</div></div><span class="badge ${statusCls(t.status)}">${esc(t.status||'queued')}</span></div>
                    <div class="task-card-body">${esc(t.request_text||'')}</div>
                    <div class="task-card-progress"><div class="task-card-progress-top"><span>${esc(t.id||'-')}</span><span>${p}%</span></div><div class="task-microbar"><span style="width:${p}%"></span></div></div>
                    <div class="task-card-badges">${badges||'<span class="badge queued">queued</span>'}${t.status==='failed'?`<button class="btn danger sm" style="margin-left:auto" onclick="retryTask('${esc(t.id)}')">重试</button><button class="btn ghost sm" onclick="deleteTask('${esc(t.id)}')">删除</button>`:(t.status==='completed'?`<button class="btn ghost sm" style="margin-left:auto" onclick="deleteTask('${esc(t.id)}')">删除</button>`:'')}</div>
                </div>`;
            }).join('') : '<div class="empty no-icon"><div class="empty-title">暂无任务</div></div>'}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderApprovals(approvals) {
    if (!approvals.length) return '<div class="empty"><div class="empty-title">当前没有待处理审批</div><div class="empty-desc">审批请求将在任务需要人工干预时出现</div></div>';
    return `<div style="display:grid;gap:12px">${approvals.map(a => {
        const tid = JSON.stringify(String(a.task_id||''));
        const aid = JSON.stringify(String(a.id||''));
        return `<div class="approval-card">
            <div class="approval-head"><div><div class="approval-title">${esc(a.task_title||'Pending')}</div><div class="approval-sub">${esc(humanStage(a.stage))} · ${esc(a.id||'-')}</div></div><span class="badge waiting_human">pending</span></div>
            <div class="approval-reason">${esc(a.reason||'Approval required')}</div>
            <div class="approval-actions">
                <button class="btn primary sm" onclick='resolveApproval(${tid},${aid},"approved")'>批准</button>
                <button class="btn danger sm" onclick='resolveApproval(${tid},${aid},"rejected")'>拒绝</button>
            </div>
        </div>`;
    }).join('')}</div>`;
}

function renderAgents(agents) {
    if (!agents.length) return '<div class="empty"><div class="empty-title">暂无 Agent 状态</div><div class="empty-desc">Agent 信息将在任务运行时显示</div></div>';
    return `<div class="agent-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))">${agents.map(a => `
        <div class="agent-card">
            <div class="agent-top"><div><div class="agent-name">${esc(a.name||'Agent')}</div><div class="agent-model">${esc(a.model||'-')}</div></div><span class="badge ${statusCls(a.status)}">${esc(a.status||'idle')}</span></div>
            <div class="agent-role">${esc(a.role||'')}</div>
            <div class="agent-badges"><span class="badge">done ${esc(a.completed_tasks||0)}</span><span class="badge">${esc(humanStage(a.last_stage||'-'))}</span></div>
        </div>
    `).join('')}</div>`;
}

function renderFeed(events) {
    let filtered = [...events].reverse().slice(0,150);
    if (feedFilter !== 'all') filtered = filtered.filter(e => e.level === feedFilter);
    if (!filtered.length) return '<div class="empty"><div class="empty-title">暂无事件</div></div>';
    return `<div class="feed" style="max-height:calc(100vh - 250px)">${filtered.map(e => `
        <div class="feed-item">
            <div class="feed-top">
                <span class="feed-dot ${esc(e.level||'info')}"></span>
                <span class="feed-time">${fmtTime(e.timestamp)}</span>
                <span class="feed-source">${esc(e.source||'system')}</span>
                ${e.stage?`<span class="feed-stage-tag">${esc(humanStage(e.stage))}</span>`:''}
            </div>
            <div class="feed-msg">${esc(e.message||'')}</div>
        </div>
    `).join('')}</div>`;
}

let historyData = null;
let statsData = null;
let lessonsData = null;

async function loadHistory() {
    const hb = document.getElementById('history-body');
    if (!hb) return;
    hb.innerHTML = '<div class="history-loading" style="text-align:center;padding:40px;color:var(--text-muted)"><div class="loading-spinner lg" style="margin:0 auto 16px"></div>加载中...</div>';
    
    try {
        const [historyRes, statsRes, lessonsRes] = await Promise.all([
            fetch('/api/memory/history?limit=30'),
            fetch('/api/memory/statistics'),
            fetch('/api/memory/lessons?limit=10'),
        ]);
        historyData = await historyRes.json();
        statsData = await statsRes.json();
        lessonsData = await lessonsRes.json();
        
        hb.innerHTML = renderHistory();
    } catch (e) {
        hb.innerHTML = `<div class="empty"><div class="empty-title">加载失败</div><div class="empty-desc">${e.message}</div></div>`;
    }
}

async function importHistory() {
    const hb = document.getElementById('history-body');
    if (hb) hb.innerHTML = '<div class="history-loading" style="text-align:center;padding:40px;color:var(--text-muted)"><div class="loading-spinner lg" style="margin:0 auto 16px"></div>正在导入历史任务...</div>';
    
    try {
        const res = await fetch('/api/memory/import', { method: 'POST' });
        const data = await res.json();
        showToast(`已导入 ${data.imported} 个历史任务`);
        await loadHistory();
    } catch (e) {
        showToast(`导入失败: ${e.message}`, true);
        if (hb) hb.innerHTML = `<div class="empty"><div class="empty-title">导入失败</div><div class="empty-desc">${e.message}</div></div>`;
    }
}

                    ${stats.daily_trend.map(d => `

async function loadArtifacts(taskId) {
    artifactTaskId = taskId;
    openArtifacts.clear();
    const ab = document.getElementById('artifact-body');
    if (!taskId) {
        if (ab) ab.innerHTML = '<div class="empty"><div class="empty-title">选择一个任务</div><div class="empty-desc">从下拉菜单选择任务查看其产物</div></div>';
        return;
    }
    if (ab) ab.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)"><div class="loading-spinner lg" style="margin:0 auto 16px"></div>加载中...</div>';
    if (!artifactCache[taskId]) {
        const r = await fetch(`/api/tasks/${taskId}/artifacts`);
        artifactCache[taskId] = await r.json();
    }
    if (ab) ab.innerHTML = renderArtifactsContent(artifactCache[taskId]);
}

function toggleArtifact(id) {
    if (openArtifacts.has(id)) openArtifacts.delete(id);
    else openArtifacts.add(id);
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}

function downloadArtifact(name, content) {
    const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

function renderArtifactsContent(data) {
    if (!data || !Object.keys(data).length) return '<div class="empty"><div class="empty-title">暂无产物</div><div class="empty-desc">该任务还没有生成任何产物文件</div></div>';
    let counter = 0;
    return `<div class="artifact-stages">${STAGES.map(stage => {
        const files = data[stage];
        if (!files || !files.length) return '';
        return `<div>
            <div class="artifact-stage-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'grid':'none'">
                <span class="artifact-stage-name">${getStageIcon(stage)} ${esc(humanStage(stage))}</span>
                <span class="artifact-stage-count">${files.length} 文件</span>
            </div>
            <div class="artifact-files" style="display:none">${files.map(f => {
                const id = 'af-' + (counter++);
                const isJson = f.name.endsWith('.json');
                const display = isJson ? (()=>{ try { return JSON.stringify(JSON.parse(f.content),null,2); } catch(e) { return f.content; } })() : f.content;
                const isOpen = openArtifacts.has(id);
                return `<div class="artifact-file">
                    <div class="artifact-file-header" onclick="toggleArtifact('${id}')">
                        <div>
                            <div class="artifact-file-name">${esc(f.name)}</div>
                            <div class="artifact-file-path">${esc(f.path)}</div>
                        </div>
                        <div style="display:flex;gap:8px;align-items:center">
                            <button class="btn ghost sm" onclick="event.stopPropagation();downloadArtifact('${esc(f.name)}',artifactCache['${esc(artifactTaskId)}']['${esc(stage)}'][${files.indexOf(f)}].content)">下载</button>
                            <span class="artifact-file-toggle">${isOpen?'▲':'▼'}</span>
                        </div>
                    </div>
                    <div class="artifact-content ${isOpen?'open':''}" id="${id}"><pre>${esc(display)}</pre></div>
                </div>`;
            }).join('')}</div>
        </div>`;
    }).join('')}</div>`;
}

// Backwards compatibility
function renderArtifacts(data) {
    return renderArtifactsContent(data);
}

function renderFeed(events) {
    let filtered = [...events].reverse().slice(0,150);
    if (feedFilter !== 'all') filtered = filtered.filter(e => e.level === feedFilter);
    if (!filtered.length) return '<div class="empty">暂无事件</div>';
    return `<div class="feed">${filtered.map(e => `
        <div class="feed-item">
            <div class="feed-top">
                <span class="feed-dot ${esc(e.level||'info')}"></span>
                <span class="feed-time">${fmtTime(e.timestamp)}</span>
                <span class="feed-source">${esc(e.source||'system')}</span>
                ${e.stage?`<span class="feed-stage-tag">${esc(humanStage(e.stage))}</span>`:''}
            </div>
            <div class="feed-msg">${esc(e.message||'')}</div>
        </div>
    `).join('')}</div>`;
}

/* ── Pipeline Editor V2 ── */
const ALL_STAGES = [
    {id:'intake', name:'Request Intake', agent:'planner', icon:'📥'},
    {id:'planning', name:'Sprint Planning', agent:'planner', icon:'📋'},
    {id:'requirements', name:'Requirements', agent:'requirements-analyst', icon:'📝'},
    {id:'design', name:'System Design', agent:'system-architect', icon:'🏗️'},
    {id:'development', name:'Implementation', agent:'developer', icon:'💻'},
    {id:'code_review', name:'Code Review', agent:'code-reviewer', icon:'👁️'},
    {id:'security_review', name:'Security Review', agent:'security-reviewer', icon:'🔒'},
    {id:'safety_review', name:'Safety Review', agent:'safety-reviewer', icon:'🛡️'},
    {id:'testing', name:'QA Testing', agent:'qa-engineer', icon:'🧪'},
    {id:'build_verification', name:'Build Verify', agent:'build-verifier', icon:'🔧'},
    {id:'delivery', name:'Gerrit Delivery', agent:'delivery-manager', icon:'🚀'},
];

// Stage data with fallback rules
let editorStages = [];
let fallbackRules = {}; // { stageId: { enabled: boolean, targetStageId: string, maxRetries: number } }
let selectedStageId = null;
let editorLoaded = false;
let pipelineIsCustom = false;
let pipelineFetched = false;
let renderThrottleTimer = null;
let pendingAddStage = null;

function initPipelineEditor() {
    if (!editorLoaded) {
        const sourceStages = SAVED_PIPELINE_STAGES?.length ? SAVED_PIPELINE_STAGES : STAGES.map(id => ({id}));
        editorStages = sourceStages.map(item => {
            const id = toStageId(item);
            const stage = ALL_STAGES.find(s => s.id === id);
            return stage ? {...stage} : {id, name: item?.name || id, agent: item?.agent || '-', icon: '⚙️'};
        });
        fallbackRules = {};
        editorStages.forEach(s => {
            const saved = sourceStages.find(item => toStageId(item) === s.id)?.fallback;
            fallbackRules[s.id] = saved
                ? { enabled: !!saved.enabled, targetStageId: saved.targetStageId || '', maxRetries: saved.maxRetries || 3 }
                : { enabled: false, targetStageId: '', maxRetries: 3 };
        });
        if (!SAVED_PIPELINE_STAGES?.length && fallbackRules.testing) {
            fallbackRules.testing = { enabled: true, targetStageId: 'development', maxRetries: 3 };
        }
        if (!SAVED_PIPELINE_STAGES?.length && fallbackRules.code_review) {
            fallbackRules.code_review = { enabled: true, targetStageId: 'development', maxRetries: 2 };
        }
        editorLoaded = true;
    }
    const tag = document.getElementById('pipe-mode-tag');
    const btn = document.getElementById('pipe-restore-btn');
    if (tag) tag.textContent = pipelineIsCustom ? '自定义配置' : '系统默认';
    if (btn) btn.style.display = pipelineIsCustom ? '' : 'none';
    renderPipelineEditor();
}

function renderPipelineEditor() {
    const body = document.getElementById('pipe-editor-body');
    if (!body) return;

    const flowHtml = editorStages.map((s, i) => {
        const hasFallback = fallbackRules[s.id]?.enabled;
        const isSelected = selectedStageId === s.id;
        const rule = fallbackRules[s.id];
        const targetStage = rule?.enabled ? editorStages.find(t => t.id === rule.targetStageId) : null;
        return `
            ${i > 0 ? `<div class="pipe-connector"><svg viewBox="0 0 32 12"><path d="M0 6 L24 6 M20 2 L26 6 L20 10"/></svg></div>` : ''}
            <div class="pipe-node ${isSelected ? 'selected' : ''} ${hasFallback ? 'has-fallback' : ''}" 
                 onclick="selectPipeStage('${s.id}')" data-stage="${s.id}" data-index="${i}">
                <div class="pipe-node-card">
                    <div class="pipe-node-num">${i + 1}</div>
                    <div class="pipe-node-name">${esc(s.name)}</div>
                    <div class="pipe-node-agent">${esc(s.agent)}</div>
                    <div class="pipe-node-actions">
                        <button class="pipe-node-btn settings" onclick="event.stopPropagation();selectPipeStage('${s.id}')" title="配置">⚙</button>
                        <button class="pipe-node-btn delete" onclick="event.stopPropagation();pipeRemove(${i})" title="删除">×</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // Build fallback arrows data
    const fallbackArrows = [];
    editorStages.forEach((s, i) => {
        const rule = fallbackRules[s.id];
        if (rule?.enabled && rule.targetStageId) {
            const targetIdx = editorStages.findIndex(t => t.id === rule.targetStageId);
            if (targetIdx >= 0 && targetIdx < i) {
                fallbackArrows.push({
                    fromIdx: i,
                    toIdx: targetIdx,
                    fromId: s.id,
                    toId: rule.targetStageId,
                    fromName: s.name,
                    toName: editorStages[targetIdx].name,
                    retries: rule.maxRetries
                });
            }
        }
    });

    // Build legend if there are fallback rules
    const hasAnyFallback = fallbackArrows.length > 0;
    const legendHtml = hasAnyFallback ? `
        <div class="pipe-legend">
            <div class="pipe-legend-item">
                <div class="pipe-legend-line"></div>
                <span>正常流程</span>
            </div>
            <div class="pipe-legend-item">
                <div class="pipe-legend-line fallback"></div>
                <span>失败回退 (点击查看详情)</span>
            </div>
        </div>
    ` : '';

    const configPanelHtml = selectedStageId ? renderStageConfig(selectedStageId) : '';

    body.innerHTML = `
        <div class="pipe-editor-v2">
            <div class="pipe-canvas" id="pipe-canvas">
                <div class="pipe-flow" id="pipe-flow">
                    ${flowHtml}
                    <div class="pipe-connector"><svg viewBox="0 0 32 12"><path d="M0 6 L24 6 M20 2 L26 6 L20 10"/></svg></div>
                    <div class="pipe-add-node" onclick="openAddStageModal()">
                        <div class="pipe-add-btn">+</div>
                        <div class="pipe-add-label">添加</div>
                    </div>
                </div>
                <svg class="pipe-fallback-layer" id="pipe-fallback-svg"></svg>
            </div>
            ${legendHtml}
            ${configPanelHtml}
        </div>
    `;

    // Draw fallback arrows after DOM is ready
    if (fallbackArrows.length > 0) {
        requestAnimationFrame(() => drawFallbackArrows(fallbackArrows));
    }
    
    // Render preview
    renderEditorPreview();
}

function renderEditorPreview() {
    const preview = document.getElementById('pipe-preview-content');
    if (!preview) return;
    
    // Generate preview using editorStages (current edited config)
    const stageList = editorStages.map(s => s.id);
    let html = '<div class="pipeline-visual" style="margin:0"><div class="pipeline-stages">';
    
    stageList.forEach((stage, idx) => {
        const isLast = idx === stageList.length - 1;
        const hasFallback = fallbackRules[stage]?.enabled;
        const rule = fallbackRules[stage];
        // Only show fallback hint if target is also in current stageList
        const validFallback = hasFallback && stageList.includes(rule?.targetStageId);
        
        html += `
            <div class="pipeline-stage pending ${validFallback ? 'has-fallback-preview' : ''}">
                <div class="pipeline-stage-node" style="${validFallback ? 'border-color:var(--amber)' : ''}">
                    ${getStageIcon(stage)}
                </div>
                <div class="pipeline-stage-info">
                    <div class="psi-name">${esc(humanStage(stage))}</div>
                    <div class="psi-status pending">待处理</div>
                    ${validFallback ? `<div class="psi-fallback-hint">↩ ${esc(humanStage(rule.targetStageId))}</div>` : ''}
                </div>
            </div>
            ${!isLast ? '<div class="pipeline-stage-connector"><div class="connector-line"></div></div>' : ''}
        `;
    });
    
    html += '</div></div>';
    
    // Add summary - only count fallback rules for stages that exist in current editor
    const totalStages = stageList.length;
    const fallbackCount = stageList.filter(id => {
        const rule = fallbackRules[id];
        return rule?.enabled && stageList.includes(rule.targetStageId);
    }).length;
    html += `
        <div class="preview-summary">
            <span class="preview-stat"><strong>${totalStages}</strong> 个阶段</span>
            <span class="preview-stat"><strong>${fallbackCount}</strong> 个回退规则</span>
        </div>
    `;
    
    preview.innerHTML = html;
}

function drawFallbackArrows(arrows) {
    const svg = document.getElementById('pipe-fallback-svg');
    const canvas = document.getElementById('pipe-canvas');
    const flow = document.getElementById('pipe-flow');
    if (!svg || !canvas || !flow) return;

    // Get flow offset within canvas
    const flowOffsetTop = flow.offsetTop;
    const flowOffsetLeft = flow.offsetLeft;
    
    // Set SVG dimensions based on content
    const svgHeight = flow.offsetHeight + 100; // Extra space for curves below
    svg.style.width = canvas.scrollWidth + 'px';
    svg.style.height = svgHeight + 'px';
    
    let svgContent = '';
    
    arrows.forEach((arrow, arrowIdx) => {
        const fromNode = document.querySelector(`[data-index="${arrow.fromIdx}"]`);
        const toNode = document.querySelector(`[data-index="${arrow.toIdx}"]`);
        if (!fromNode || !toNode) return;
        
        const fromCard = fromNode.querySelector('.pipe-node-card');
        const toCard = toNode.querySelector('.pipe-node-card');
        if (!fromCard || !toCard) return;
        
        // Calculate positions using offsetLeft/offsetTop relative to canvas
        const fromX = fromNode.offsetLeft + fromNode.offsetWidth / 2 + flowOffsetLeft;
        const fromY = flowOffsetTop + fromNode.offsetTop + fromCard.offsetHeight + 15;
        const toX = toNode.offsetLeft + toNode.offsetWidth / 2 + flowOffsetLeft;
        const toY = flowOffsetTop + toNode.offsetTop + toCard.offsetHeight + 15;
        
        // Calculate curve - goes down, curves back, comes up
        const baseY = Math.max(fromY, toY);
        const midY = baseY + 25 + (arrowIdx * 18); // Stagger multiple arrows
        
        // SVG path: from source down, curve horizontally, up to target
        const path = `M ${fromX} ${fromY} 
                      L ${fromX} ${midY - 8}
                      Q ${fromX} ${midY}, ${fromX - 12} ${midY}
                      L ${toX + 12} ${midY}
                      Q ${toX} ${midY}, ${toX} ${midY - 8}
                      L ${toX} ${toY + 6}`;
        
        // Arrow head pointing up at target
        const arrowHead = `M ${toX - 4} ${toY + 10} L ${toX} ${toY + 3} L ${toX + 4} ${toY + 10}`;
        
        svgContent += `
            <g class="pipe-fallback-arrow-group" onclick="selectPipeStage('${arrow.fromId}')" style="cursor:pointer">
                <path d="${path}" style="stroke:var(--amber);stroke-width:2;fill:none;stroke-dasharray:6 4;animation:dash-flow 1s linear infinite"/>
                <path d="${arrowHead}" style="stroke:var(--amber);stroke-width:2;fill:var(--amber)"/>
                <title>失败回退: ${arrow.fromName} → ${arrow.toName} (最多重试 ${arrow.retries} 次)</title>
            </g>
        `;
        
        // Add label at the middle of the curve
        const labelX = (fromX + toX) / 2;
        const labelY = midY + 3;
        svgContent += `
            <foreignObject x="${labelX - 45}" y="${labelY - 8}" width="90" height="22">
                <div xmlns="http://www.w3.org/1999/xhtml" style="
                    background:var(--amber);
                    color:#fff;
                    font-size:9px;
                    font-weight:700;
                    padding:3px 8px;
                    border-radius:99px;
                    text-align:center;
                    white-space:nowrap;
                    box-shadow:0 2px 6px rgba(245,158,11,0.35);
                ">↩ ${arrow.retries}次重试</div>
            </foreignObject>
        `;
    });
    
    svg.innerHTML = svgContent;
}

function renderStageConfig(stageId) {
    const stage = editorStages.find(s => s.id === stageId);
    if (!stage) return '';
    
    const idx = editorStages.findIndex(s => s.id === stageId);
    const rule = fallbackRules[stageId] || { enabled: false, targetStageId: '', maxRetries: 3 };
    
    // Get stages that can be fallback targets (before current stage)
    const possibleTargets = editorStages.slice(0, idx);
    
    return `
        <div class="pipe-config-panel fade-in">
            <div class="pipe-config-header">
                <div class="pipe-config-title">${STAGE_ICONS[stageId] || '⚙️'} ${esc(stage.name)} 配置</div>
                <button class="pipe-config-close" onclick="closePipeConfig()">×</button>
            </div>
            <div class="pipe-config-body">
                <div class="pipe-config-section">
                    <div class="pipe-config-label">基本信息</div>
                    <div style="display:grid;gap:10px">
                        <div class="fallback-rule" style="border-color:var(--accent-soft)">
                            <div class="fallback-icon" style="background:var(--accent-soft);color:var(--accent)">⚙️</div>
                            <div class="fallback-content">
                                <div class="fallback-desc" style="color:var(--text-primary);font-weight:600">执行 Agent</div>
                                <div style="font-size:12px;color:var(--text-secondary)">${esc(stage.agent)}</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="pipe-config-section">
                    <div class="pipe-config-label">失败回退规则</div>
                    <div class="fallback-rules">
                        <div class="fallback-rule ${rule.enabled ? 'active' : ''}">
                            <div class="fallback-icon">↩</div>
                            <div class="fallback-content">
                                <div class="fallback-desc">当此阶段失败时，自动回退到指定阶段重试</div>
                                <div class="fallback-target">
                                    <span style="font-size:12px;color:var(--text-muted)">回退到：</span>
                                    <select class="fallback-select" onchange="updateFallbackTarget('${stageId}', this.value)" ${!possibleTargets.length ? 'disabled' : ''}>
                                        <option value="">不回退（直接失败）</option>
                                        ${possibleTargets.map(t => `
                                            <option value="${t.id}" ${rule.targetStageId === t.id ? 'selected' : ''}>${esc(t.name)}</option>
                                        `).join('')}
                                    </select>
                                </div>

                            <div class="fallback-toggle ${rule.enabled ? 'on' : ''}" onclick="toggleFallback('${stageId}')"></div>
                        </div>
                        
                        ${rule.enabled ? `
                        <div class="fallback-rule" style="padding:14px 16px">

                                <span class="retry-label">最大重试次数：</span>
                                <input type="number" class="retry-input" value="${rule.maxRetries}" min="1" max="10" 
                                       onchange="updateFallbackRetries('${stageId}', this.value)">

                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                
                ${idx > 0 ? `
                <div class="pipe-config-section">
                    <div class="pipe-config-label">位置调整</div>
                    <div style="display:flex;gap:8px">
                        <button class="btn ghost sm" onclick="moveStage('${stageId}', -1)" ${idx === 0 ? 'disabled' : ''}>← 前移</button>
                        <button class="btn ghost sm" onclick="moveStage('${stageId}', 1)" ${idx === editorStages.length - 1 ? 'disabled' : ''}>后移 →</button>
                    </div>
