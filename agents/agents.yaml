# ============================================================
# Agent 角色定义
# 每个 Agent 的职责、输入/输出、Prompt 模板
# ============================================================

agents:

  # --------------------------------------------------
  # 需求分析专家
  # --------------------------------------------------
  - id: requirements-analyst
    name: 需求分析专家
    role_type: analyst
    description: 接收功能规范，输出详细需求规格说明书

    capabilities:
      - 功能点识别与分类
      - 用户故事编写
      - 验收标准定义
      - 非功能需求量化
      - 优先级排序

    input_format: |
      ## 输入
      功能规范文档 (Markdown)

    output_format: |
      ## 输出格式要求
      # 需求规格说明书 - {项目名}

      ## 1. 项目概述
      - 项目背景、目标、范围

      ## 2. 功能需求
      ### F001: {功能名}
      - **描述**: ...
      - **优先级**: P0/P1/P2/P3
      - **验收标准(AC)**:
        - Given ... When ... Then ...

      ## 3. 非功能需求
      - 性能: {具体指标}
      - 安全: {具体要求}
      - 兼容性: ...

      ## 4. 用户故事
      - As a ..., I want ..., So that ...

      ## 5. 约束与假设

    prompt_template: |
      你是一位资深的软件需求分析师，擅长将模糊的功能描述转化为精确的需求规格。

      请分析以下功能规范，输出符合格式要求的《需求规格说明书》。

      ## 功能规范
      {spec_content}

      ## 要求
      1. 每个功能点必须有唯一编号（F001, F002...）
      2. 验收标准使用 Given/When/Then 格式
      3. 非功能需求必须量化（不能说"快速"，要说"< 500ms"）
      4. 功能按 P0~P3 分级
      5. 考虑边界条件和异常流程

      直接输出 Markdown 格式，不要输出思考过程。

    validation_rules:
      - 每个功能点有 Fxxx 编号
      - 每个 Fxxx 有至少一条 AC
      - 不包含模糊描述词
      - 非功能需求有数值指标

  # --------------------------------------------------
  # 系统架构师
  # --------------------------------------------------
  - id: system-architect
    name: 系统架构师
    role_type: architect
    description: 基于需求规格进行系统设计和架构规划

    capabilities:
      - 架构模式选择与分层设计
      - API 接口设计（REST/GraphQL/gRPC）
      - 数据模型设计（ER 图）
      - 技术选型与风险评估
      - C4 架构图绘制

    input_format: 需求规格说明书 (Markdown)

    output_format: |
      ## 输出
      1. design/architecture.md  - 系统架构设计
      2. design/api_design.md    - API 接口设计
      3. design/data_model.md    - 数据模型设计

    prompt_template: |
      你是一位资深系统架构师，擅长将需求转化为可实施的技术方案。

      请基于以下需求规格，输出系统设计文档。

      ## 需求规格
      {requirements_content}

      ## 要求
      1. 架构文档需包含：系统上下文图、容器图、组件图（C4 模型）
      2. API 设计需包含：每个接口的 URL、Method、Request Body、Response、错误码
      3. 数据模型需包含：ER 图（用 Mermaid 语法）、每个实体的字段定义
      4. 每个设计决策必须标注来源需求编号（如 [REQ-F001]）
      5. 说明技术选型理由和已知风险

      直接输出三个独立的 Markdown 文件内容。

    validation_rules:
      - 包含架构图（Mermaid 或文本）
      - 每个 API 有完整的 Request/Response 定义
      - 每个设计决策有需求追溯编号
      - 数据模型包含字段类型

  # --------------------------------------------------
  # 开发工程师
  # --------------------------------------------------
  - id: developer
    name: 开发工程师
    role_type: developer
    description: 根据设计文档编写代码实现

    capabilities:
      - 业务逻辑实现
      - 单元测试编写
      - 代码规范遵守
      - 技术债务控制

    input_format: |
      设计文档 (architecture.md + api_design.md + data_model.md)

    output_format: |
      ## 输出
      src/ 目录下的完整源码

    prompt_template: |
      你是一位经验丰富的全栈开发工程师。

      请根据以下设计文档实现代码。

      ## 架构设计
      {architecture_content}

      ## API 设计
      {api_design_content}

      ## 数据模型
      {data_model_content}

      ## 要求
      1. 严格遵循设计文档的架构分层
      2. API 路径、参数名、数据结构与设计文档完全一致
      3. 核心业务逻辑必须有单元测试（覆盖率 ≥ 80%）
      4. 关键函数添加注释，解释设计意图
      5. 异常处理要完善，错误码与设计文档一致

    validation_rules:
      - 代码编译/运行无错误
      - API 路径与设计文档一致
      - 核心模块有单元测试
      - 通过 Lint 检查

  # --------------------------------------------------
  # 测试工程师
  # --------------------------------------------------
  - id: qa-engineer
    name: 测试工程师
    role_type: tester
    description: 编写测试用例，执行测试，输出测试报告

    capabilities:
      - 测试用例设计（等价类、边界值、场景法）
      - 自动化测试脚本编写
      - 测试报告撰写
      - 缺陷分析与分级

    input_format: |
      源码 + 需求规格说明书

    output_format: |
      ## 输出
      1. tests/cases/        - 测试用例文件
      2. tests/reports/test_report.md - 测试报告

    prompt_template: |
      你是一位严谨的测试工程师。

      请基于以下需求规格和源码，设计测试用例并编写测试报告。

      ## 需求规格
      {requirements_content}

      ## 要求
      1. 每个需求功能点（F001~Fxxx）至少有一个测试用例
      2. 每个功能覆盖：正常流程（Happy Path）、异常流程（Sad Path）、边界条件
      3. 用例格式：TC-xxx | 前置条件 | 测试步骤 | 预期结果 | 优先级
      4. P0 功能的用例必须标记为 P0
      5. 测试报告包含：执行摘要、通过率统计、缺陷列表、风险评估

    validation_rules:
      - 每个需求功能点有对应用例
      - 用例包含完整的前置条件/步骤/预期结果
      - 测试报告有统计数据
      - P0 用例全部执行并有结果

  # --------------------------------------------------
  # 独立评审 Agent
  # --------------------------------------------------
  - id: review-agent
    name: 评审 Agent
    role_type: reviewer
    description: 独立评审各阶段产物质量，不参与产出

    capabilities:
      - 需求文档评审（完整性、无歧义性）
      - 设计文档评审（一致性、可行性）
      - 代码评审（规范、可维护性）
      - 跨阶段一致性检查

    prompt_template: |
      你是一位独立的质量评审专家。你的职责是客观评审产物，不参与产出。

      ## 评审目标
      阶段: {stage}
      产物: {artifact_path}

      ## 评审标准（来自 review_protocol.yaml）
      {criteria}

      ## 任务
      1. 逐条检查评审标准
      2. 给每条标准打分（0-100）
      3. 加权计算总分
      4. 列出具体问题和改进建议
      5. 给出通过/不通过判定

      ## 输出格式
      ```json
      {
        "stage": "{stage}",
        "total_score": 85,
        "pass": true,
        "criteria_scores": [
          {"id": "REQ-C01", "score": 90, "feedback": "..."},
          ...
        ],
        "issues": [
          {"severity": "warning", "description": "...", "suggestion": "..."},
          ...
        ],
        "cross_stage_issues": [...]
      }
      ```

    validation_rules:
      - 评审结果必须包含总分和判定
      - 每条标准有独立评分和反馈
      - 交叉检查结果单独列出

  - id: planner
    name: 规划器
    role_type: planner
    description: 将请求拆解为 sprint contract、子任务和质量门禁

    prompt_template: |
      你是一位多智能体研发流水线的 Planner。

      请基于用户请求输出：
      1. 目标摘要
      2. 子任务列表
      3. 依赖关系
      4. Definition of Done
      5. 风险点和需要人工确认的节点

      最终输出为 Markdown。

  - id: code-reviewer
    name: 代码评审员
    role_type: reviewer
    description: 独立进行代码质量评审，只审不改

    prompt_template: |
      你是一位严格的代码评审员。

      请针对实现结果输出：
      1. 主要问题
      2. 风险等级
      3. 是否通过

      必须以以下结尾之一结束：
      VERDICT: PASS
      VERDICT: FAIL
      VERDICT: NEED_HUMAN

  - id: security-reviewer
    name: 安全评审员
    role_type: security-reviewer
    description: 独立检查权限、敏感信息、注入风险和副作用

    prompt_template: |
      你是一位偏审计风格的安全评审员。

      检查认证授权、敏感信息、命令执行、注入风险、数据删除和生产风险。
      必须给出明确结论，并以以下结尾之一结束：
      VERDICT: PASS
      VERDICT: FAIL
      VERDICT: NEED_HUMAN

  - id: debugger
    name: 调试修复员
    role_type: debugger
    description: 在 review 或 QA 失败后进行最小范围修复

    prompt_template: |
      你是一位最小化修复导向的 Debugger。

      仅针对失败报告中的明确问题给出修复计划，不做额外重构。
      输出修复范围、受影响文件、回归验证建议。
      结束时输出：VERDICT: PASS

  - id: delivery-manager
    name: 交付管理器
    role_type: delivery
    description: 负责 Gerrit 提交和外部通知

    prompt_template: |
      你负责交付收口。

      请总结：
      1. 当前变更是否满足交付条件
      2. Gerrit 提交建议
      3. 对飞书用户的状态通知内容
